<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሱቅ መቆጣጠሪያ ሲስተም</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        /* 4ቱ ማሳያዎች ለየብቻ እንዲሆኑ የተደረገበት */
        .dashboard-v2 {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .card-v2 {
            background: #ffffff;
            padding: 16px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border-left: 6px solid #7f8c8d;
        }
        .card-v2.capital { border-left-color: #2980b9; background: #ebf5fb; }
        .card-v2.profit { border-left-color: #27ae60; background: #eafaf1; color: #1e8449; }
        .card-v2.expense { border-left-color: #c0392b; background: #fdedec; color: #922b21; }
        .card-v2.top-item { border-left-color: #f39c12; background: #fef9e7; }

        .section-title {
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 15px;
            margin-top: 20px;
            margin-bottom: 12px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .status-msg {
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
            min-height: 22px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }
        .btn-sell { background-color: #27ae60; }
        .btn-expense { background-color: #c0392b; }
        .btn-add { background-color: #2980b9; }
        
        .inventory-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 5px;
        }
        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .inventory-item:last-child { border-bottom: none; }
        hr {
            border: 0;
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>የሱቅ መቆጣጠሪያ ዳሽቦርድ</h2>
    
    <div class="dashboard-v2">
        <div class="card-v2 capital">
            <span>💰 ጠቅላላ የካፒታል መጠን፡</span>
            <span id="lbl-capital">0 ብር</span>
        </div>
        <div class="card-v2 profit">
            <span>📈 የቀን የተጣራ ትርፍ፡</span>
            <span id="lbl-profit">0 ብር</span>
        </div>
        <div class="card-v2 expense">
            <span>📉 የቀን ጠቅላላ ወጪ፡</span>
            <span id="lbl-expense">0 ብር</span>
        </div>
        <div class="card-v2 top-item">
            <span>🔥 በጣም እየተሸጠ ያለው እቃ፡</span>
            <span id="lbl-top">-</span>
        </div>
    </div>

    <div class="status-msg" id="lbl-status" style="color: #27ae60;">እንኳን ደህና መጡ!</div>

    <div class="section-title">📦 1. የሽያጭ መመዝገቢያ ፎርም</div>
    <div class="form-group">
        <label>የሚሸጠውን ዕቃ ይምረጡ፦</label>
        <select id="select-sell-item"></select>
    </div>
    <button class="btn-sell" onclick="recordSale()">ሽያጭ መዝግብ (1 ዕቃ)</button>

    <hr>

    <div class="section-title">➕ 2. አዲስ ዕቃ / ክምችት መጨመሪያ ፎርም</div>
    <div class="form-group">
        <label>የዕቃ ስም፦</label>
        <input type="text" id="txt-add-name" placeholder="ምሳሌ፦ ፌስታል፣ ሻይ ቅጠል">
    </div>
    <div class="form-group">
        <label>የዕቃ ብዛት (ኳንቲቲ)፦</label>
        <input type="number" id="txt-add-qty" placeholder="ምሳሌ፦ 100">
    </div>
    <div class="form-group">
        <label>የአንድ ዕቃ መግዣ ዋጋ፦</label>
        <input type="number" id="txt-add-cost" placeholder="ምሳሌ፦ 50">
    </div>
    <div class="form-group">
        <label>የአንድ ዕቃ መሸጫ ዋጋ፦</label>
        <input type="number" id="txt-add-sell-price" placeholder="ምሳሌ፦ 70">
    </div>
    <button class="btn-add" onclick="addNewItem()">አዲስ ዕቃ ወደ ሲስተም አስገባ</button>

    <hr>

    <div class="section-title">💸 3. የወጪ መመዝገቢያ ፎርም (ብቻውን)</div>
    <div class="form-group">
        <label>የወጪ ምክንያት፦</label>
        <input type="text" id="txt-expense-reason" placeholder="ምሳሌ፦ ለቤት ኪራይ፣ ለትራንስፖርት">
    </div>
    <div class="form-group">
        <label>የወጪ መጠን (በብር)፦</label>
        <input type="number" id="txt-expense-amount" placeholder="ምሳሌ፦ 1500">
    </div>
    <button class="btn-expense" onclick="recordExpense()">ወጪውን ብቻ መዝግብ</button>

    <hr>

    <div class="section-title">📋 በሱቅ ውስጥ ያሉ የዕቃዎች ዝርዝር</div>
    <div class="inventory-list" id="inventory-list"></div>
</div>

<script>
    // ሙሉ በሙሉ ባዶ መነሻ መረጃዎች (ሳሙና እና ዘይት ጠፍተዋል)
    let data = JSON.parse(localStorage.getItem('business_data_v3')) || {
        capital: 0.0,
        total_profit: 0.0,
        total_expense: 0.0,
        inventory: {}, 
        sales_count: {}
    };

    function saveData() {
        localStorage.setItem('business_data_v3', JSON.stringify(data));
        updateDashboard();
        updateInventoryDisplay();
        populateDropdown();
    }

    function calculateCapital() {
        let total = 0;
        for (let item in data.inventory) {
            let details = data.inventory[item];
            total += details[0] * details[1]; // ብዛት x መግዣ ዋጋ
        }
        data.capital = total;
    }

    function updateDashboard() {
        calculateCapital();
        document.getElementById('lbl-capital').innerText = `${data.capital.toLocaleString()} ብር`;
        document.getElementById('lbl-profit').innerText = `${data.total_profit.toLocaleString()} ብር`;
        document.getElementById('lbl-expense').innerText = `${data.total_expense.toLocaleString()} ብር`;
        
        let topItem = "-";
        let maxSales = 0;
        for (let item in data.sales_count) {
            if (data.sales_count[item] > maxSales) {
                maxSales = data.sales_count[item];
                topItem = `${item} (${maxSales} ጊዜ)`;
            }
        }
        document.getElementById('lbl-top').innerText = topItem;
    }

    function updateInventoryDisplay() {
        let listDiv = document.getElementById('inventory-list');
        listDiv.innerHTML = "";
        let hasItems = false;
        for (let item in data.inventory) {
            let details = data.inventory[item];
            listDiv.innerHTML += `<div class="inventory-item">
                <span><strong>${item}</strong> (ያለው ብዛት፦ ${details[0]})</span>
                <span>መግዣ፦ ${details[1]} ብር | መሸጫ፦ ${details[2]} ብር</span>
            </div>`;
            hasItems = true;
        }
        if(!hasItems) {
            listDiv.innerHTML = "<div style='text-align:center; padding:10px; color:#aaa;'>እስካሁን ምንም እቃ አልተመዘገበም</div>";
        }
    }

    function populateDropdown() {
        let dropdown = document.getElementById('select-sell-item');
        dropdown.innerHTML = "";
        let hasItems = false;
        for (let item in data.inventory) {
            if(data.inventory[item][0] > 0) {
                dropdown.innerHTML += `<option value="${item}">${item} (መሸጫ፡ ${data.inventory[item][2]} ብር)</option>`;
                hasItems = true;
            }
        }
        if(!hasItems) {
            dropdown.innerHTML = "<option value=''>ለመሸጥ መጀመሪያ እቃ ይመዝግቡ</option>";
        }
    }

    function showStatus(text, isError = false) {
        let status = document.getElementById('lbl-status');
        status.innerText = text;
        status.style.color = isError ? "#c0392b" : "#27ae60";
    }

    function addNewItem() {
        let name = document.getElementById('txt-add-name').value.trim();
        let qty = parseInt(document.getElementById('txt-add-qty').value);
        let cost = parseFloat(document.getElementById('txt-add-cost').value);
        let sellPrice = parseFloat(document.getElementById('txt-add-sell-price').value);

        if (!name || isNaN(qty) || isNaN(cost) || isNaN(sellPrice)) {
            return showStatus("እባክህ ሁሉንም የአዲስ ዕቃ መረጃዎች በትክክል አስገባ።", true);
        }

        if (data.inventory[name]) {
            data.inventory[name][0] += qty;
            data.inventory[name][1] = cost; 
            data.inventory[name][2] = sellPrice; 
        } else {
            data.inventory[name] = [qty, cost, sellPrice];
            data.sales_count[name] = 0;
        }

        showStatus(`ዕቃ '${name}' በስኬት ተመዝግቧል፤ የካፒታል መጠን ተዘምኗል!`);
        document.getElementById('txt-add-name').value = "";
        document.getElementById('txt-add-qty').value = "";
        document.getElementById('txt-add-cost').value = "";
        document.getElementById('txt-add-sell-price').value = "";
        saveData();
    }

    function recordSale() {
        let name = document.getElementById('select-sell-item').value;

        if (!name || !data.inventory[name] || data.inventory[name][0] <= 0) {
            return showStatus("ለመሸጥ የሚሆን ዕቃ በክምችት ውስጥ የለም።", true);
        }

        let costPrice = data.inventory[name][1];
        let sellPrice = data.inventory[name][2];
        let profit = sellPrice - costPrice;

        data.inventory[name][0] -= 1; 
        data.sales_count[name] = (data.sales_count[name] || 0) + 1;
        data.total_profit += profit; // ትርፍ ከሽያጭ ብቻ ይሰላል

        showStatus(`ሽያጭ ተመዝግቧል! የተጣራ ትርፍ: +${profit} ብር`);
        saveData();
    }

    function recordExpense() {
        let reason = document.getElementById('txt-expense-reason').value.trim();
        let expense = parseFloat(document.getElementById('txt-expense-amount').value);

        if (!reason || isNaN(expense)) {
            return showStatus("እባክህ የወጪውን ምክንያት እና የብር መጠን በትክክል አስገባ።", true);
        }

        data.total_expense += expense; // ወጪ ለብቻው እዚህ ይደመራል (ከሽያጭ ትርፍ ጋር አይቀላቀልም)

        showStatus(`ወጪ ማስታወሻ፦ '${reason}' በብር ${expense} ተመዝግቧል!`);
        document.getElementById('txt-expense-reason').value = "";
        document.getElementById('txt-expense-amount').value = "";
        saveData();
    }

    // መጀመሪያ ገጹ ሲከፈት
    updateDashboard();
    updateInventoryDisplay();
    populateDropdown();
</script>
</body>
</html>
