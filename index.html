<style>

.sheet-footer { padding:14px 20px; border-top:1px solid #f1f5f9; }

/* side drawer */
.drawer-overlay { position:fixed; inset:0; z-index:55; display:flex; justify-content:flex-start; }

.drawer-body { overflow-y:auto; padding:14px; flex:1; }

.menu-item .em { font-size:20px; }
.menu-item .sub { font-size:11px; color:#94a3b8; font-weight:500; margin-top:2px; }

.helpmsg { color:#94a3b8; font-size:11.5px; margin-bottom:10px; line-height:1.5; }

.alloc-row { display:flex; align-items:center; gap:8px; background:#f8fafc; border-radius:10px; padding:8px; margin-bottom:8px; }
.alloc-name { flex:1.4; } .alloc-pct { width:64px; } .alloc-amt { flex:1; text-align:right; font-weight:700; font-size:13px; color:#1e293b; }

.empty { text-align:center; color:#94a3b8; font-size:13px; padding:24px 0; }

.progress-track { width:100%; height:10px; border-radius:999px; background:#e2e8f0; overflow:hidden; }
.progress-fill { height:100%; border-radius:999px; transition:width .25s ease; }

.goal-ok { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; font-weight:800; font-size:13px; padding:12px; border-radius:12px; text-align:center; }

<body>
<div id="root"></div>

<script>
(function () {
"use strict";

/* ================= constants & storage keys ================= */
var STORAGE_KEY = "shop-control-data-v5";
var OLD_V4_KEY = "shop-control-data-v4";
var OLD_V3_KEY = "shop-control-data-v3";
var OLD_V2_KEY = "shop-control-data-v2";
var FIREBASE_CFG_KEY = "shop-control-firebase-cfg";
var PERIOD_LABEL = { day: "የቀን", week: "የሳምንት", month: "የወር", year: "የአመት" };
var ETH_MONTHS = ["መስከረም","ጥቅምት","ኅዳር","ታኅሳስ","ጥር","የካቲት","መጋቢት","ሚያዝያ","ግንቦት","ሰኔ","ሐምሌ","ነሐሴ","ጳጉሜን"];
var ETH_WEEKDAYS = ["ሰኞ","ማክሰኞ","ረቡዕ","ሐሙስ","ዓርብ","ቅዳሜ","እሁድ"]; // Monday-first, matches our week range
var EXPENSE_CATEGORIES = ["ኪራይ", "ደመወዝ", "መብራት/ውሃ", "ትራንስፖርት", "ሌላ"];
var BANK_NAMES = ["CBE (ንግድ ባንክ)", "አዋሽ ባንክ", "ዳሸን ባንክ", "አቢሲኒያ ባንክ", "ኦሮሚያ ባንክ", "ሌላ"];

/* Default monthly capital-accumulation TARGET (still editable per-shop in the
   Goal Tracker page — this is just the starting default, not a hardcoded
   fact about the shop). The PROGRESS toward this target is never invented:
   it is always derived from the actual % of profit the shop owner has
   assigned to "capital" in their own allocation table (see
   capitalAllocationPercent() below), multiplied by their real booked
   profit for the period. */
var GOAL_MONTHLY_CENTS_DEFAULT = 21000000; // 210,000 ብር በወር (ነባሪ ግብ)

/* ================= tiny DOM helper ================= */
function el(tag, props, children) {
  var e = document.createElement(tag);
  props = props || {};
  for (var k in props) {
    if (!props.hasOwnProperty(k)) continue;
    var v = props[k];
    if (v === undefined || v === null) continue;
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") { for (var s in v) e.style[s] = v[s]; }
    else if (k.indexOf("on") === 0 && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  children = children || [];
  if (!Array.isArray(children)) children = [children];
  children.forEach(function (c) {
    if (c === null || c === undefined || c === false) return;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function escapeHtml(s) {
  return String(s === undefined || s === null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* local (NOT utc) today, so Ethiopia-timezone users never get a day-shift bug */
function todayISO() {
  var d = new Date();
  var y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}
function toCents(v) { var n = parseFloat(v); if (isNaN(n)) n = 0; return Math.round(n * 100); }
function fmt(cents) {
  cents = Math.round(Number(cents) || 0);
  var neg = cents < 0; cents = Math.abs(cents);
  var whole = Math.floor(cents / 100), frac = cents % 100;
  return (neg ? "-" : "") + whole.toLocaleString("en-US") + "." + String(frac).padStart(2, "0") + " ብር";
}
function daysBetween(iso1, iso2) {
  var a = new Date(iso1 + "T00:00:00"), b = new Date(iso2 + "T00:00:00");
  return Math.max(0, Math.round((b - a) / 86400000));
}

/* ================= double-submit guard =================
   A fast double-tap on mobile can fire two click events before the first
   re-render removes the button. This module-level lock makes every "add"
   action atomic — a second call within the cooldown is simply ignored,
   so a sale/expense/item can never be recorded twice from one tap. */
var submitLock = false;
function guarded(fn) {
  return function () {
    if (submitLock) return;
    submitLock = true;
    try { fn.apply(null, arguments); } finally { setTimeout(function () { submitLock = false; }, 600); }
  };
}

/* ================= Ethiopian calendar (pure math, no network) ================= */
function isGregLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
function ethNewYearGregorianDate(gYear) {
  var day = isGregLeap(gYear + 1) ? 12 : 11;
  return new Date(gYear, 8, day); // September
}
function gregorianToEthiopian(gDate) {
  var gYear = gDate.getFullYear();
  var nyThisG = ethNewYearGregorianDate(gYear);
  var startGYear = gDate >= nyThisG ? gYear : gYear - 1;
  var newYear = ethNewYearGregorianDate(startGYear);
  var diffDays = Math.floor((gDate - newYear) / 86400000);
  var ethYear = startGYear - 7;
  var month = Math.floor(diffDays / 30) + 1;
  var day = (diffDays % 30) + 1;
  return { year: ethYear, month: month, day: day };
}
function ethLabel(y, m) { return ETH_MONTHS[m - 1] + " " + y + " ዓ.ም"; }
/* Gregorian ISO date of the 1st day of a given Ethiopian year+month (used for goal tracker range) */
function ethMonthStartGregorianISO(ethYear, ethMonth) {
  var startGYear = ethYear + 7;
  var newYear = ethNewYearGregorianDate(startGYear);
  var d = new Date(newYear);
  d.setDate(d.getDate() + (ethMonth - 1) * 30);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function ethiopianYearStartGregorianISO(ethYear) {
  var startGYear = ethYear + 7;
  var d = ethNewYearGregorianDate(startGYear);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

/* ================= period range (used by the main dashboard's "today") ================= */
function periodRange(period) {
  var now = new Date(), start;
  if (period === "day") start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  else if (period === "week") { var day = now.getDay(); var diffToMonday = (day + 6) % 7; start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diffToMonday); }
  else if (period === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
  else start = new Date(now.getFullYear(), 0, 1);
  return { start: start.getTime(), end: now.getTime() + 1 };
}
function inPeriod(iso, range) { var t = new Date(iso + "T00:00:00").getTime(); return t >= range.start && t <= range.end; }

/* ================= data model =================
baseCapitalCents : manually editable base (cash/investment not tied to stock)
items[]  : {id,name,costPriceCents,sellPriceCents,openingStock,dateAdded,createdAt}
sales[]  : {id,itemId,itemName,qty,unitPriceCents,unitCostCents,totalCents,customer,date,createdAt}
expenses[]: {id,title,amountCents,date,createdAt}
allocations[]: {id,name,percent}

Every downstream number (stock, capital, revenue, profit, per-day/month/year
totals) is DERIVED from this log each time it's needed — nothing is ever
incremented directly — so numbers can never drift, double-count, or
disagree with each other. */
function freshAllocations() {
  return [
    { id: uid(), name: "ቁጠባ", percent: 10 },
    { id: uid(), name: "ለስራ ካፒታል", percent: 70 },
    { id: uid(), name: "ወጪ", percent: 20 }
  ];
}
function freshData() { return { baseCapitalCents: 0, items: [], sales: [], expenses: [], allocations: freshAllocations(), profile: freshProfile(), loanCenter: freshLoanCenter(), capitalGoalMonthlyCents: GOAL_MONTHLY_CENTS_DEFAULT }; }
function freshProfile() { return { shopName: "", ownerName: "", email: "", phone: "", tin: "", license: "", businessSector: "", digitalId: "", businessRegistration: "", address: "", managerPhoto: "" }; }
function freshLoanCenter() {
  return {
    requestedAmountCents: 0,
    usageAllocations: [{ id: uid(), purpose: "አዲስ ዕቃ ግዢ", percent: 60 }, { id: uid(), purpose: "ኢንቬንቶሪ ማስፋፊያ", percent: 20 }, { id: uid(), purpose: "ሌላ", percent: 20 }],
    proformaInvoices: [],
    cashFlowProjection: [],
    suppliers: [],
    marketAnalysis: ""
  };
}

function loadData() {
  try {
    var v = localStorage.getItem(STORAGE_KEY);
    if (v) {
      var d = JSON.parse(v);
      if (d && Array.isArray(d.items) && Array.isArray(d.sales) && Array.isArray(d.expenses)) {
        if (!Array.isArray(d.allocations)) d.allocations = freshAllocations();
        if (typeof d.baseCapitalCents !== "number") d.baseCapitalCents = 0;
        if (typeof d.capitalGoalMonthlyCents !== "number" || d.capitalGoalMonthlyCents <= 0) d.capitalGoalMonthlyCents = GOAL_MONTHLY_CENTS_DEFAULT;
        if (!d.profile || typeof d.profile !== "object") d.profile = freshProfile();
        else { var fp = freshProfile(); for (var pk in fp) if (!(pk in d.profile)) d.profile[pk] = fp[pk]; }
        if (!d.loanCenter || typeof d.loanCenter !== "object") d.loanCenter = freshLoanCenter();
        else {
          var fl = freshLoanCenter();
          if (typeof d.loanCenter.requestedAmountCents !== "number") d.loanCenter.requestedAmountCents = 0;
          if (!Array.isArray(d.loanCenter.usageAllocations) || d.loanCenter.usageAllocations.length === 0) d.loanCenter.usageAllocations = fl.usageAllocations;
          if (!Array.isArray(d.loanCenter.proformaInvoices)) d.loanCenter.proformaInvoices = [];
          if (!Array.isArray(d.loanCenter.cashFlowProjection)) d.loanCenter.cashFlowProjection = [];
          if (!Array.isArray(d.loanCenter.suppliers)) d.loanCenter.suppliers = [];
          if (typeof d.loanCenter.marketAnalysis !== "string") d.loanCenter.marketAnalysis = "";
        }
        return d;
      }
    }
  } catch (e) {}
  // migrate forward from any earlier version we can find
  var chain = [OLD_V4_KEY, OLD_V3_KEY];
  for (var i = 0; i < chain.length; i++) {
    try {
      var raw = localStorage.getItem(chain[i]);
      if (raw) {
        var o = JSON.parse(raw);
        if (o && Array.isArray(o.items)) {
          return {
            baseCapitalCents: Number(o.baseCapitalCents || o.openingCapitalCents) || 0,
            items: o.items || [], sales: o.sales || [], expenses: o.expenses || [],

          }),

var storageAvailable = true;
var storageErrorDetail = "";
function saveLocal(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); storageAvailable = true; } catch (e) { storageAvailable = false; storageErrorDetail = (e && e.message) ? e.message : String(e); } }

/* ================= derived calculations ================= */
function itemStock(data, itemId) {
  var item = data.items.find(function (i) { return i.id === itemId; });
  if (!item) return 0;
  var sold = data.sales.filter(function (s) { return s.itemId === itemId; }).reduce(function (s, x) { return s + x.qty; }, 0);
  return item.openingStock - sold;
}
function itemSoldOutInfo(data, item) {
  var stock = itemStock(data, item.id);
  if (stock > 0) return { soldOut: false, daysSoFar: daysBetween(item.dateAdded, todayISO()) };
  var salesForItem = data.sales.filter(function (s) { return s.itemId === item.id; }).slice().sort(function (a, b) { return a.createdAt - b.createdAt; });
  var cum = 0, soldOutDate = null;
  for (var i = 0; i < salesForItem.length; i++) {
    cum += salesForItem[i].qty;
    if (cum >= item.openingStock) { soldOutDate = salesForItem[i].date; break; }
  }
  if (!soldOutDate) return { soldOut: false, daysSoFar: daysBetween(item.dateAdded, todayISO()) };
  return { soldOut: true, soldOutDate: soldOutDate, days: daysBetween(item.dateAdded, soldOutDate) };
}
function lineProfitCents(sale) { return (sale.unitPriceCents - sale.unitCostCents) * sale.qty; }
function inventoryValueCents(data) {
  return data.items.reduce(function (s, it) { return s + Math.max(0, itemStock(data, it.id)) * it.costPriceCents; }, 0);
}
function totalCapitalCents(data) { return data.baseCapitalCents + inventoryValueCents(data); }
/* stock/capital as of a cutoff date — used only for the "value at start of
   this Ethiopian year vs now" comparison on the PDF report. Same derivation
   principle as the live numbers, just filtered to a date range, so it can
   never disagree with the live totals when the cutoff is "today". */
function itemStockAsOf(data, itemId, cutoffISO) {
  var item = data.items.find(function (i) { return i.id === itemId; });
  if (!item) return 0;
  var sold = data.sales.filter(function (s) { return s.itemId === itemId && s.date <= cutoffISO; }).reduce(function (s, x) { return s + x.qty; }, 0);
  return item.openingStock - sold;
}
function inventoryValueAsOf(data, cutoffISO) {
  return data.items.filter(function (it) { return it.dateAdded <= cutoffISO; })
    .reduce(function (s, it) { return s + Math.max(0, itemStockAsOf(data, it.id, cutoffISO)) * it.costPriceCents; }, 0);
}
function capitalAsOf(data, cutoffISO) { return data.baseCapitalCents + inventoryValueAsOf(data, cutoffISO); }

function statsFor(sales, expenses) {
  var revenue = sales.reduce(function (s, x) { return s + x.totalCents; }, 0);
  var expenseTotal = expenses.reduce(function (s, x) { return s + x.amountCents; }, 0);
  var profit = sales.reduce(function (s, x) { return s + lineProfitCents(x); }, 0) - expenseTotal;
  var counts = {};
  sales.forEach(function (s) { counts[s.itemName] = (counts[s.itemName] || 0) + s.qty; });
  var topName = null, topQty = 0;
  Object.keys(counts).forEach(function (n) { if (counts[n] > topQty) { topQty = counts[n]; topName = n; } });
  return { revenue: revenue, expenseTotal: expenseTotal, profit: profit, topName: topName, topQty: topQty };
}
/* Cash / bank-transfer / on-credit split — every sale is counted in exactly
   one bucket (whatever it was tagged with), so the three always sum back
   to total revenue exactly. Sales recorded before this feature existed
   have no paymentMethod field and default safely to "cash". */
function paymentBreakdown(sales) {
  var cash = 0, bank = 0, credit = 0, creditOutstanding = 0, creditCollected = 0;
  sales.forEach(function (s) {
    var m = s.paymentMethod || "cash";
    if (m === "bank") bank += s.totalCents;
    else if (m === "credit") { credit += s.totalCents; if (s.paid) creditCollected += s.totalCents; else creditOutstanding += s.totalCents; }
    else cash += s.totalCents;
  });
  return { cash: cash, bank: bank, credit: credit, creditOutstanding: creditOutstanding, creditCollected: creditCollected };
}
function expenseByCategory(expenses) {
  var map = {};
  expenses.forEach(function (e) { var c = e.category || "ሌላ"; map[c] = (map[c] || 0) + e.amountCents; });
  return map;
}
/* "customer traffic" — we don't track unique customer identity reliably (many
   walk-in sales share no phone/ID), so the honest, defensible proxy for a
   bank report is the number of separate sales transactions. Clearly labeled
   as such wherever it's shown so it's never mistaken for verified footfall. */
function transactionCount(sales) { return sales.length; }
/* Reconciliation check: cash + bank + credit must equal total revenue.
   Because every sale is derived and counted in exactly one bucket, this is
   true by construction — but we still compute and display it explicitly so
   the figure is auditable, and so it would visibly flag if data were ever
   corrupted (e.g. a manually edited Firestore document). */
function verifyPaymentReconciliation(sales) {
  var pay = paymentBreakdown(sales);
  var total = sales.reduce(function (s, x) { return s + x.totalCents; }, 0);
  var sumOfMethods = pay.cash + pay.bank + pay.credit;
  return { ok: sumOfMethods === total, total: total, sumOfMethods: sumOfMethods, pay: pay };
}
function periodStats(data, period) {
  var range = periodRange(period);
  var sales = data.sales.filter(function (s) { return inPeriod(s.date, range); });
  var expenses = data.expenses.filter(function (e) { return inPeriod(e.date, range); });
  var st = statsFor(sales, expenses);
  st.salesInPeriod = sales; st.expensesInPeriod = expenses;
  return st;
}
function dayStats(data, iso) {
  return statsFor(data.sales.filter(function (s) { return s.date === iso; }), data.expenses.filter(function (e) { return e.date === iso; }));
}
/* group EVERY sale/expense once into Ethiopian year+month buckets — single pass, single source */
function ethiopianBuckets(data) {
  var map = {}; // key "y-m" -> {sales:[], expenses:[]}
  function bucketFor(iso) {
    var e = gregorianToEthiopian(new Date(iso + "T00:00:00"));
    var key = e.year + "-" + e.month;
    if (!map[key]) map[key] = { year: e.year, month: e.month, sales: [], expenses: [] };
    return map[key];
  }
  data.sales.forEach(function (s) { bucketFor(s.date).sales.push(s); });
  data.expenses.forEach(function (e) { bucketFor(e.date).expenses.push(e); });
  return map;
}

/* Ethiopian months are always 30 days except Pagume (13th), which has 5 days
   in a normal year and 6 days right before an Ethiopian leap year. This is
   only used to pace the goal evenly across however many days the current
   Ethiopian month actually has. */
function daysInEthMonth(ethYear, ethMonth) {
  if (ethMonth <= 12) return 30;
  return isGregLeap(ethYear + 8) ? 6 : 5;
}
/* Which allocation row represents "capital"? We don't hardcode 70% — we
   read whatever percentage the shop owner has actually assigned to the row
   named "ካፒታል" (e.g. "ለስራ ካፒታል") in their own profit-allocation table
   (☰ → 🧮). If they've renamed/removed that row, we fall back to the
   standard 70% default so the tracker still has something sensible to show,
   but as soon as they set up their own allocation it takes over automatically. */
function capitalAllocationPercent(data) {
  var row = (data.allocations || []).find(function (a) { return a.name && a.name.indexOf("ካፒታል") !== -1; });
  return row ? (Number(row.percent) || 0) : 70;
}

/* ================= Goal Tracker (Ethiopian-month capital-accumulation goal) =================
   DATA-DRIVEN: nothing here is invented. The "capital saved so far" figure
   is always the real % assigned to capital (capitalAllocationPercent) times
   the REAL net profit booked so far this Ethiopian month — exactly the same
   number the shop owner sees in their own profit-allocation table. The only
   configurable input is the monthly TARGET itself (editable in the Goal
   Tracker page), which is then paced evenly across the real number of days
   in the current Ethiopian month to know whether today's progress is on
   track — never a separately-invented daily figure. */
function goalTrackerStats(data) {
  var todayEth = gregorianToEthiopian(new Date());
  var buckets = ethiopianBuckets(data);
  var key = todayEth.year + "-" + todayEth.month;
  var bucket = buckets[key];
  var monthStats = bucket ? statsFor(bucket.sales, bucket.expenses) : { revenue: 0, expenseTotal: 0, profit: 0 };
  var capitalPct = capitalAllocationPercent(data);
  var actualCapitalAllocatedCents = monthStats.profit > 0 ? Math.round(monthStats.profit * (capitalPct / 100)) : 0;
  var monthlyGoalCents = (data.capitalGoalMonthlyCents && data.capitalGoalMonthlyCents > 0) ? data.capitalGoalMonthlyCents : GOAL_MONTHLY_CENTS_DEFAULT;
  var totalDaysInMonth = daysInEthMonth(todayEth.year, todayEth.month);
  var daysElapsed = Math.min(todayEth.day, totalDaysInMonth);
  var paceToDateCents = Math.round(monthlyGoalCents * (daysElapsed / totalDaysInMonth));
  var shortfallCents = paceToDateCents - actualCapitalAllocatedCents;
  var pctOfMonthlyGoal = monthlyGoalCents > 0 ? Math.min(100, Math.max(0, Math.round((actualCapitalAllocatedCents / monthlyGoalCents) * 100))) : 0;
  return {
    ethYear: todayEth.year, ethMonth: todayEth.month, daysElapsed: daysElapsed, totalDaysInMonth: totalDaysInMonth,
    capitalPct: capitalPct, monthProfitCents: monthStats.profit,
    monthlyGoalCents: monthlyGoalCents, paceToDateCents: paceToDateCents,
    actualCents: actualCapitalAllocatedCents, shortfallCents: shortfallCents,
    onTrack: shortfallCents <= 0, pctOfMonthlyGoal: pctOfMonthlyGoal
  };
}

/* ================= Capital Utilization Tracker =================
   Once money is allocated to "capital" (via the % above), did it actually
   get put to work buying stock/inventory, or is it just sitting idle?
   The app has no separate "restock/purchase" ledger, so the honest,
   defensible proxy is: the cost (costPrice × openingStock) of every item
   whose dateAdded falls inside the period — i.e. inventory that was
   actually acquired during that window. This is the same category of
   clearly-labeled proxy already used elsewhere in this app (see
   transactionCount / paymentBreakdown notes) — it is disclosed wherever
   shown, never presented as a verified purchase log. */
function capitalUtilizationStats(data, period) {
  var todayEth = gregorianToEthiopian(new Date());
  var buckets = ethiopianBuckets(data);
  var capitalPct = capitalAllocationPercent(data);
  var profitCents, itemsInPeriod, label;
  if (period === "year") {
    var yearSales = [], yearExpenses = [];
    for (var m = 1; m <= 13; m++) { var b = buckets[todayEth.year + "-" + m]; if (b) { yearSales = yearSales.concat(b.sales); yearExpenses = yearExpenses.concat(b.expenses); } }
    profitCents = statsFor(yearSales, yearExpenses).profit;
    var yearStartISO = ethiopianYearStartGregorianISO(todayEth.year);
    itemsInPeriod = data.items.filter(function (it) { return it.dateAdded >= yearStartISO; });
    label = todayEth.year + " ዓ.ም (አመታዊ)";
  } else {
    var bucket = buckets[todayEth.year + "-" + todayEth.month];
    profitCents = bucket ? statsFor(bucket.sales, bucket.expenses).profit : 0;
    var monthStartISO = ethMonthStartGregorianISO(todayEth.year, todayEth.month);
    itemsInPeriod = data.items.filter(function (it) { return it.dateAdded >= monthStartISO; });
    label = ethLabel(todayEth.year, todayEth.month) + " (ወርሃዊ)";
  }
  var allocatedCents = profitCents > 0 ? Math.round(profitCents * (capitalPct / 100)) : 0;
  var utilizedCents = itemsInPeriod.reduce(function (s, it) { return s + (it.costPriceCents || 0) * (it.openingStock || 0); }, 0);
  var usedCents = Math.min(allocatedCents, utilizedCents);
  var idleCents = Math.max(0, allocatedCents - utilizedCents);
  var overageCents = Math.max(0, utilizedCents - allocatedCents);
  var usedPct = allocatedCents > 0 ? Math.min(100, Math.round((usedCents / allocatedCents) * 100)) : 0;
  return { label: label, capitalPct: capitalPct, allocatedCents: allocatedCents, utilizedCents: utilizedCents, usedCents: usedCents, idleCents: idleCents, overageCents: overageCents, usedPct: usedPct };
}

function openAddExpenseModal(existing) {
  var titleInput, amountInput, dateInput, categorySelect, errBox;
  openSheet(existing ? "ወጪ አርም" : "ወጪ መዝግብ", function (body) {
    categorySelect = el("select", { class: "input" });
    EXPENSE_CATEGORIES.forEach(function (c) { categorySelect.appendChild(el("option", { value: c }, c)); });
    categorySelect.value = existing ? (existing.category || "ሌላ") : "ኪራይ";
    titleInput = el("input", { class: "input", placeholder: "ማብራሪያ (ካስፈለገ)", value: existing ? (existing.title || "") : "" });
    amountInput = el("input", { class: "input", type: "number", step: "0.01", min: "0", placeholder: "0.00", value: existing ? (existing.amountCents / 100).toFixed(2) : "" });
    dateInput = el("input", { class: "input", type: "date", value: existing ? existing.date : todayISO() });
    errBox = el("div", { class: "errmsg" });
    body.appendChild(Field("የወጪ ምድብ", true, categorySelect));
    body.appendChild(Field("ማብራሪያ", false, titleInput));
    body.appendChild(Field("መጠን", true, amountInput));
    body.appendChild(Field("ቀን", true, dateInput));
    body.appendChild(errBox);
  }, function (close) {
    var btn = el("button", { class: "btn btn-primary" }, "አስቀምጥ");
    btn.addEventListener("click", guarded(function () {
      var amt = toCents(amountInput.value);
      if (amt <= 0) { errBox.textContent = "እባክዎ ትክክለኛ መጠን ያስገቡ"; return; }
      var title = titleInput.value.trim() || categorySelect.value;
      setData(function (d) {
        if (existing) {
          var e = d.expenses.find(function (x) { return x.id === existing.id; });
          if (e) { e.title = title; e.amountCents = amt; e.date = dateInput.value || todayISO(); e.category = categorySelect.value; e.syncStatus = "pending"; }
        } else {
          d.expenses.push({ id: uid(), title: title, category: categorySelect.value, amountCents: amt, date: dateInput.value || todayISO(), createdAt: Date.now(), syncStatus: "pending" });
        }
        return d;
      });
      showToast(existing ? "ተስተካክሏል" : "ወጪ ተመዝግቧል");
      close();
    }));
    return btn;
  });
}

function openAllocationModal() {
  var rows = state.data.allocations.map(function (a) { return { id: a.id, name: a.name, percent: a.percent }; });
  var listWrap, totalLabel;
  function redraw() {
    clear(listWrap);
    rows.forEach(function (r, idx) {
      var nameInput = el("input", { class: "input alloc-name", value: r.name });
      nameInput.addEventListener("input", function (e) { r.name = e.target.value; });
      var pctInput = el("input", { class: "input alloc-pct", type: "number", step: "0.1", value: r.percent });
      pctInput.addEventListener("input", function (e) { r.percent = Number(e.target.value) || 0; updateTotal(); });
      var rmBtn = el("button", { class: "trash-btn" }, "✕");
      rmBtn.addEventListener("click", function () { rows.splice(idx, 1); redraw(); });
      listWrap.appendChild(el("div", { class: "flex gap2 items-center", style: { marginBottom: "8px" } }, [nameInput, pctInput, rmBtn]));
    });
    updateTotal();
  }
  function updateTotal() {
    var tot = rows.reduce(function (s, r) { return s + Number(r.percent); }, 0);
    if (totalLabel) { totalLabel.textContent = "ጠቅላላ: " + tot + "%" + (Math.abs(tot - 100) > 0.01 ? " (100% አይደለም)" : " ✓"); totalLabel.style.color = Math.abs(tot - 100) > 0.01 ? "#f59e0b" : "#16a34a"; }
  }
  openSheet("የትርፍ ክፍፍል ማስተካከያ", function (body) {
    body.appendChild(el("div", { class: "helpmsg" }, "የፈለጉትን ስም እና መቶኛ ይስጡ (ለምሳሌ 10% ቁጠባ, 70% ለስራ ካፒታል, 20% ወጪ)። ትርፍ ባልተገኘበት ጊዜ ክፍፍሉ ራሱ አይሰላም።"));
    listWrap = el("div", {});
    body.appendChild(listWrap);
    var addBtn = el("button", { class: "btn btn-outline btn-sm", style: { marginTop: "4px" } }, "+ ክፍል ጨምር");
    addBtn.addEventListener("click", function () { rows.push({ id: uid(), name: "አዲስ ክፍል", percent: 0 }); redraw(); });
    body.appendChild(addBtn);
    totalLabel = el("div", { style: { fontSize: "12px", fontWeight: "700", marginTop: "12px", textAlign: "center" } });
    body.appendChild(totalLabel);
    redraw();
  }, function (close) {
    var btn = el("button", { class: "btn btn-primary" }, "አስቀምጥ");
    btn.addEventListener("click", guarded(function () {
      setData(function (d) { d.allocations = rows.map(function (r) { return { id: r.id, name: r.name.trim() || "ክፍል", percent: Number(r.percent) || 0, syncStatus: "pending" }; }); return d; });
      close();
    }));
    return btn;
  });
}

/* ================= sales tab ================= */
function renderSales(container) {
  container.appendChild(el("div", { class: "eyebrow section" }, "📝 ሽያጭ መመዝገቢያ ፎርም"));
  var formCard = el("div", { class: "card section" });
  formCard.style.borderColor = "#e2e8f0";
  var state_ = { itemId: "", qty: 1, customer: "", price: "" };

  var pickerField = el("div", { class: "field" });
  pickerField.appendChild(el("label", {}, "የሚሸጠውን ዕቃ ይምረጡ:"));
  var pickerBox = el("div", { class: "picker-box" });
  pickerField.appendChild(pickerBox);
  formCard.appendChild(pickerField);
  var restWrap = el("div", {});
  formCard.appendChild(restWrap);

  function drawPicker() {
    clear(pickerBox);
    var item = state.data.items.find(function (i) { return i.id === state_.itemId; });
    if (item) {
      var sel = el("button", { class: "picker-selected" }, [
        el("span", { style: { fontWeight: "700" } }, item.name),
        el("span", { style: { fontSize: "11px", color: "#2563eb", fontWeight: "700" } }, "ለውጥ")
      ]);
      sel.addEventListener("click", function () { state_.itemId = ""; drawPicker(); drawRest(); });
      pickerBox.appendChild(sel);
    } else {
      var search = el("input", { class: "input", placeholder: "🔍 የዕቃ ስም ይፈልጉ..." });
      var listBox = el("div", { class: "picker-list" });
      function renderList(q) {
        clear(listBox);
        var filtered = state.data.items.filter(function (i) { return i.name.toLowerCase().indexOf((q || "").toLowerCase()) !== -1; });
        if (filtered.length === 0) { listBox.appendChild(el("div", { style: { padding: "10px", fontSize: "12px", color: "#94a3b8" } }, "ምንም ዕቃ አልተገኘም")); return; }
        filtered.forEach(function (i) {
          var stock = itemStock(state.data, i.id);
          var row = el("button", { class: "picker-item" }, [el("span", {}, i.name), el("span", { style: { color: "#94a3b8" } }, "ዋጋ: " + fmt(i.sellPriceCents) + " · ስቶክ: " + stock)]);
          row.addEventListener("click", function () { state_.itemId = i.id; state_.price = (i.sellPriceCents / 100).toFixed(2); drawPicker(); drawRest(); });
          listBox.appendChild(row);
        });
      }
      search.addEventListener("input", function (e) { renderList(e.target.value); });
      pickerBox.appendChild(search); pickerBox.appendChild(listBox);
      renderList("");
    }
  }

  function drawRest() {
    clear(restWrap);
    var item = state.data.items.find(function (i) { return i.id === state_.itemId; });
    if (!item) return;
    if (!state_.paymentMethod) state_.paymentMethod = "cash";

    var custInput = el("input", { class: "input", placeholder: "ለምሳሌ አበበ", value: state_.customer });
    custInput.addEventListener("input", function (e) { state_.customer = e.target.value; });
    restWrap.appendChild(Field("የደንበኛ ስም (ካስፈለገ)", false, custInput));

    var priceInput = el("input", { class: "input", type: "number", step: "0.01", min: "0", value: state_.price, style: { fontWeight: "700" } });
    priceInput.addEventListener("input", function (e) { state_.price = e.target.value; updateTotal(); });
    restWrap.appendChild(Field("የሽያጭ ዋጋ (ቅናሽ ማድረግ ይችላሉ) — መደበኛ ዋጋ: " + fmt(item.sellPriceCents), true, priceInput));

    var qtyRow = el("div", { class: "flex gap2 items-center" });
    var minusBtn = el("button", { class: "btn btn-outline btn-sm" }, "−");
    var qtyInput = el("input", { class: "input", type: "number", min: "1", value: state_.qty, style: { textAlign: "center", flex: "1" } });
    var plusBtn = el("button", { class: "btn btn-outline btn-sm" }, "+");
    minusBtn.addEventListener("click", function () { state_.qty = Math.max(1, state_.qty - 1); qtyInput.value = state_.qty; updateTotal(); });
    plusBtn.addEventListener("click", function () { state_.qty = state_.qty + 1; qtyInput.value = state_.qty; updateTotal(); });
    qtyInput.addEventListener("input", function (e) { state_.qty = Math.max(1, Number(e.target.value) || 1); updateTotal(); });
    qtyRow.appendChild(minusBtn); qtyRow.appendChild(qtyInput); qtyRow.appendChild(plusBtn);
    restWrap.appendChild(Field("የዕቃ ብዛት (መጠን)", true, qtyRow));

    // --- payment method (cash / bank transfer / on credit) ---
    var payField = el("div", { class: "field" });
    payField.appendChild(el("label", {}, "የክፍያ አይነት"));
    var payRow = el("div", { class: "pill-row", style: { width: "100%" } });
    var payExtra = el("div", { class: "mt2" });
    var PAY_OPTS = [{ k: "cash", l: "ካሽ" }, { k: "bank", l: "ባንክ ትራንስፈር" }, { k: "credit", l: "በዱቤ" }];
    function drawPayExtra() {
      clear(payExtra);
      if (state_.paymentMethod === "bank") {
        var bankSelect = el("select", { class: "input" });
        BANK_NAMES.forEach(function (b) { bankSelect.appendChild(el("option", { value: b, selected: state_.bankName === b ? "selected" : undefined }, b)); });
        if (!state_.bankName) state_.bankName = BANK_NAMES[0];
        bankSelect.value = state_.bankName;
        bankSelect.addEventListener("change", function (e) { state_.bankName = e.target.value; });
        payExtra.appendChild(Field("የባንክ ስም", true, bankSelect));
      } else if (state_.paymentMethod === "credit") {
        var phoneInput = el("input", { class: "input", type: "tel", placeholder: "የደንበኛ ስልክ ቁጥር", value: state_.customerPhone || "" });
        phoneInput.addEventListener("input", function (e) { state_.customerPhone = e.target.value; });
        var dueInput = el("input", { class: "input", type: "date", value: state_.dueDate || "" });
        dueInput.addEventListener("input", function (e) { state_.dueDate = e.target.value; });
        payExtra.appendChild(Field("የደንበኛ ስልክ", true, phoneInput));
        payExtra.appendChild(Field("የክፍያ ቀን ገደብ (Due Date)", true, dueInput));
      }
    }
    PAY_OPTS.forEach(function (o) {
      var b = el("button", { class: "pill" + (state_.paymentMethod === o.k ? " active" : ""), style: { flex: "1" } }, o.l);
      b.addEventListener("click", function () { state_.paymentMethod = o.k; drawRest(); });
      payRow.appendChild(b);
    });
    payField.appendChild(payRow);
    payField.appendChild(payExtra);
    restWrap.appendChild(payField);
    drawPayExtra();

    var totalAmountSpan = el("span", { style: { fontWeight: "800" } }, fmt(toCents(state_.price) * state_.qty));
    restWrap.appendChild(el("div", { class: "flex items-center justify-between", style: { background: "#f8fafc", borderRadius: "10px", padding: "10px 12px", marginBottom: "12px" } }, [
      el("span", { style: { fontSize: "12px", color: "#64748b", fontWeight: "600" } }, "ጠቅላላ የሽያጭ መጠን"), totalAmountSpan
    ]));
    function updateTotal() { totalAmountSpan.textContent = fmt(toCents(state_.price) * state_.qty); }

    var errBox = el("div", { class: "errmsg" });
    restWrap.appendChild(errBox);

function openEditSaleModal(sale) {
  var qtyInput, priceInput, custInput, errBox;
  openSheet("ሽያጭ አርም", function (body) {
    body.appendChild(el("div", { class: "helpmsg" }, sale.itemName + " — ስቶክና ካፒታል ራሳቸው ከዚህ ለውጥ ጋር ይስተካከላሉ።"));
    custInput = el("input", { class: "input", value: sale.customer });
    qtyInput = el("input", { class: "input", type: "number", min: "1", value: sale.qty });
    priceInput = el("input", { class: "input", type: "number", step: "0.01", value: (sale.unitPriceCents / 100).toFixed(2) });
    errBox = el("div", { class: "errmsg" });
    body.appendChild(Field("የደንበኛ ስም", false, custInput));
    body.appendChild(Field("ብዛት", true, qtyInput));
    body.appendChild(Field("የሽያጭ ዋጋ", true, priceInput));

  }, function (close) {
    var btn = el("button", { class: "btn btn-primary" }, "አስቀምጥ");
    btn.addEventListener("click", guarded(function () {
      var qty = Math.max(1, Number(qtyInput.value) || 1);
      var priceCents = toCents(priceInput.value);
      if (priceCents <= 0) { errBox.textContent = "ትክክለኛ ዋጋ ያስገቡ"; return; }
      // ensure editing doesn't push this item's stock negative (excluding this sale's own qty from the check)
      var otherSold = state.data.sales.filter(function (s) { return s.itemId === sale.itemId && s.id !== sale.id; }).reduce(function (s, x) { return s + x.qty; }, 0);
      var item = state.data.items.find(function (i) { return i.id === sale.itemId; });
      var openingStock = item ? item.openingStock : 0;
      if (openingStock - otherSold - qty < 0) { errBox.textContent = "ይህ ለውጥ ስቶክ ከ0 በታች ያደርገዋል — ብዛቱን ይቀንሱ"; return; }
      setData(function (d) {
        var t = d.sales.find(function (x) { return x.id === sale.id; });
        if (t) { t.qty = qty; t.unitPriceCents = priceCents; t.totalCents = Math.round(priceCents * qty); t.customer = custInput.value.trim() || "ስም ያልገለጸ ደንበኛ"; }
        return d;
      });
      showToast("ተስተካክሏል");
      close();
    }));
    return btn;
  });
}

/* ============================================================
   PROFESSIONAL 9-PAGE BANK AUDIT PDF EXPORT  —  pdfMake edition
   Version 2.0 — Amharic-capable (Noto Sans Ethiopic embedded at runtime)
   ============================================================ */

/* ---- pdfMake / font loading (kicked off once at app start, see init) ----
   We proactively load pdfmake.min.js + a base64 Amharic (Noto Sans
   Ethiopic) TTF the first time the app opens, so that by the time the user
   actually taps "PDF አውርድ" the library and font are already warm in
   memory and the export feels instant instead of failing with a generic
   "internet ያረጋግጡ" error in the middle of report generation. */
var PDFMAKE_URL = "https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js";
var NOTO_ETHIOPIC_TTF_URL = "https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts/hinted/ttf/NotoSansEthiopic/NotoSansEthiopic-Regular.ttf";
var NOTO_ETHIOPIC_BOLD_TTF_URL = "https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts/hinted/ttf/NotoSansEthiopic/NotoSansEthiopic-Bold.ttf";
var pdfEngineState = "idle"; // idle | loading | ready | error
var pdfEngineError = "";
var pdfEnginePromise = null;

function arrayBufferToBase64(buffer) {
  var bytes = new Uint8Array(buffer);
  var binary = "";
  var chunk = 0x8000;
  for (var i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(binary);
}

/* Loads pdfmake + registers the Amharic font into pdfMake's virtual file
   system. Cached in pdfEnginePromise so repeated calls (auto-warm at
   startup, then the real export tap) reuse the same in-flight/completed
   request instead of re-downloading. */
function ensurePdfEngine() {
  if (pdfEnginePromise) return pdfEnginePromise;
  pdfEngineState = "loading"; pdfEngineError = "";
  pdfEnginePromise = injectScript(PDFMAKE_URL)
    .then(function () {
      return Promise.all([
        fetch(NOTO_ETHIOPIC_TTF_URL).then(function (r) { if (!r.ok) throw new Error("font fetch failed (regular)"); return r.arrayBuffer(); }),
        fetch(NOTO_ETHIOPIC_BOLD_TTF_URL).then(function (r) { if (!r.ok) throw new Error("font fetch failed (bold)"); return r.arrayBuffer(); })
      ]);
    })
    .then(function (buffers) {
      var regularB64 = arrayBufferToBase64(buffers[0]);
      var boldB64 = arrayBufferToBase64(buffers[1]);
      window.pdfMake.vfs = window.pdfMake.vfs || {};
      window.pdfMake.vfs["NotoSansEthiopic-Regular.ttf"] = regularB64;
      window.pdfMake.vfs["NotoSansEthiopic-Bold.ttf"] = boldB64;
      window.pdfMake.fonts = {
        NotoEthiopic: {
          normal: "NotoSansEthiopic-Regular.ttf",
          bold: "NotoSansEthiopic-Bold.ttf",
          italics: "NotoSansEthiopic-Regular.ttf",
          bolditalics: "NotoSansEthiopic-Bold.ttf"
        }
      };
      pdfEngineState = "ready";
      return true;
    })
    .catch(function (err) {
      pdfEngineState = "error";
      pdfEngineError = (err && err.message) || String(err);
      pdfEnginePromise = null; // allow retry on next attempt
      throw err;
    });
  return pdfEnginePromise;
}

/* ---- small pdfMake content-building helpers ---- */
var PDF_NAVY = "#122B4A", PDF_ACCENT = "#3B82F6", PDF_EMERALD = "#10A34A", PDF_CRIMSON = "#DC2626",
    PDF_AMBER = "#F59E0B", PDF_SLATE = "#1E293B", PDF_SLATE_LIGHT = "#475569", PDF_GRAY = "#94A3B8",
    PDF_LIGHT_GRAY = "#E2E8F0", PDF_BG = "#F8FAFC";
var PDF_PIE_COLORS = ["#3B82F6", "#10A34A", "#F59E0B", "#DC2626", "#8B5CF6", "#14B8A6", "#F97316"];

function pdfSectionTitle(title, subtitle) {
  var stack = [
    { text: title, fontSize: 14, bold: true, color: PDF_NAVY, margin: [0, 0, 0, subtitle ? 2 : 4] }
  ];
  if (subtitle) stack.push({ text: subtitle, fontSize: 9, color: PDF_SLATE_LIGHT, margin: [0, 0, 0, 4] });
  stack.push({ canvas: [{ type: "line", x1: 0, y1: 0, x2: 495, y2: 0, lineWidth: 0.75, lineColor: PDF_LIGHT_GRAY }], margin: [0, 0, 0, 8] });
  return { stack: stack, margin: [0, 10, 0, 4] };
}
function pdfKV(label, value, color) {
  return {
    columns: [
      { text: label, fontSize: 10, color: PDF_SLATE_LIGHT, width: "45%" },
      { text: String(value || "-"), fontSize: 10, color: color || PDF_SLATE, bold: !!color, width: "55%" }
    ],
    margin: [0, 2, 0, 2]
  };
}
function pdfHighlightBox(label, value, color) {
  return {
    table: {
      widths: ["*"],
      body: [[{
        stack: [
          { text: label, fontSize: 9, color: PDF_SLATE_LIGHT, margin: [0, 0, 0, 3] },
          { text: String(value), fontSize: 13, bold: true, color: color }
        ],
        fillColor: PDF_BG, border: [false, false, false, false], margin: [8, 8, 8, 8]
      }]]
    },
    layout: { defaultBorder: false },
    margin: [0, 4, 0, 4]
  };
}
function pdfTable(headers, rows, widths, options) {

/* Pie chart rendered to an offscreen canvas, then embedded as a PNG data URL
   (pdfMake has no native pie primitive, so this is the standard approach). */
function pdfPieChartDataUrl(segments, labels, size) {
  size = size || 220;
  var canvas = document.createElement("canvas");
  var scale = 3;
  canvas.width = size * scale; canvas.height = (size + labels.length * 20) * scale;
  var ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);
  var cx = size / 2, cy = size / 2, r = size / 2 - 12;
  var total = segments.reduce(function (s, v) { return s + Math.max(0, v); }, 0);
  if (total <= 0) {
    ctx.fillStyle = "#e2e8f0"; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.fill();
  } else {
    var start = -Math.PI / 2;
    segments.forEach(function (seg, i) {
      var angle = (Math.max(0, seg) / total) * 2 * Math.PI;
      ctx.fillStyle = PDF_PIE_COLORS[i % PDF_PIE_COLORS.length];
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, start + angle); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
      start += angle;
    });
    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(cx, cy, r * 0.45, 0, 2 * Math.PI); ctx.fill();
  }
  var ly = size + 14;
  ctx.font = "12px sans-serif";
  segments.forEach(function (seg, i) {
    if (seg <= 0) return;
    ctx.fillStyle = PDF_PIE_COLORS[i % PDF_PIE_COLORS.length];
    ctx.fillRect(4, ly - 9, 10, 10);
    ctx.fillStyle = "#475569";
    var pct = total > 0 ? Math.round((seg / total) * 100) : 0;
    ctx.fillText((labels[i] || "") + "  " + pct + "%", 18, ly);
    ly += 16;
  });
  return canvas.toDataURL("image/png");
}

/* Optional fallback only: requires internet the first time (to fetch pdfMake

function exportFullAuditPdfOnline() {
  showToast("ባለ 9-ገጽ የባንክ ሪፖርት PDF በማዘጋጀት ላይ...");
  ensurePdfEngine().then(function () {
    var docDef = buildAuditDocDefinition(state.data);
    var profile = state.data.profile || freshProfile();
    var filename = (profile.shopName || "shop").replace(/[^a-zA-Z0-9\u1200-\u137F]/g, "_") + "-bank-audit-" + todayISO() + ".pdf";
    window.pdfMake.createPdf(docDef).getBlob(function (blob) {
      shareOrDownloadPdfBlob(blob, filename);
    });
  }).catch(function (err) {
    showToast("PDF ማዘጋጀት አልተቻለም — ኢንተርኔት ያረጋግጡ");
    console.error(err);
  });
}
/* Tries the device's native Share sheet first (Telegram, WhatsApp, Drive,
   any PDF viewer, etc. — exactly like the Android Share Menu the person
   asked for). If the browser can't share files (older browsers, desktop
   Chrome without file-share support) or the user cancels, we fall back to
   a plain download link so the PDF is never just lost. */
function shareOrDownloadPdfBlob(blob, filename) {
  var file = null;
  try { file = new File([blob], filename, { type: "application/pdf" }); } catch (e) { file = null; }
  if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: filename, text: "የ" + filename + " ባንክ ኦዲት ሪፖርት" })
      .then(function () { showToast("✓ ሪፖርቱ ተጋርቷል"); })
      .catch(function (err) {
        if (err && err.name === "AbortError") return; // user closed the share sheet — not an error
        downloadPdfBlob(blob, filename);
      });
    return;
  }
  downloadPdfBlob(blob, filename);
}
function downloadPdfBlob(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
  showToast("✓ ባለ 9-ገጽ የባንክ ሪፖርት PDF ወርዷል");
}

/* ============================================================
   PRIMARY 9-PAGE REPORT — fully OFFLINE, print/share-based.
   ============================================================
   Instead of depending on a PDF-generation library and a font fetched over
   the network (which is exactly what produces "Failed to fetch" the moment
   a phone has no signal), we build a clean, styled HTML document —
   entirely in memory, entirely offline — and hand it to the browser's own
   print engine via window.print(). Android's print preview then lets the
   user "Save as PDF" or send it straight to any other app through the
   system Share sheet, satisfying the Android Print Service / Share Menu
   requirement with zero network dependency. Because the browser renders
   this exactly the same way it renders the rest of the (Amharic) app UI,
   there is no separate font to embed or fetch — whatever renders the
   app's own Amharic text renders the report's Amharic text too. */
function pageWrap(pageNum, totalPages, titleAm, titleEn, bodyHtml) {
  var cls = 'rpage' + (pageNum === 1 ? ' rpage-first' : '');
  return '<section class="' + cls + '"><div class="rpage-head"><div class="rkicker">ገጽ ' + pageNum + ' / ' + totalPages + '</div>' +
    '<h1>' + escapeHtml(titleAm) + '</h1><div class="rsub">' + escapeHtml(titleEn) + '</div></div>' + bodyHtml + '</section>';
}
function rTable(headers, rows, opts) {
  opts = opts || {};
  var boldCol = opts.boldCol || [];
  var html = '<table><thead><tr>' + headers.map(function (h) { return '<th>' + escapeHtml(h) + '</th>'; }).join("") + '</tr></thead><tbody>';
  if (rows.length === 0) {
    html += '<tr><td colspan="' + headers.length + '" class="rempty">ምንም መረጃ የለም</td></tr>';
  } else {
    rows.forEach(function (row) {
      html += '<tr>' + row.map(function (cell, i) {
        var cls = boldCol.indexOf(i) !== -1 ? ' class="rbold"' : "";
        return '<td' + cls + '>' + escapeHtml(cell === undefined || cell === null || cell === "" ? "-" : cell) + '</td>';
      }).join("") + '</tr>';
    });
  }
  html += '</tbody></table>';
  return html;
}
function rHighlight(label, value, colorClass) {
  return '<div class="rhl ' + (colorClass || "") + '"><div class="rhl-label">' + escapeHtml(label) + '</div><div class="rhl-value">' + escapeHtml(value) + '</div></div>';
}
function rKV(label, value) {
  return '<div class="rkv"><span>' + escapeHtml(label) + '</span><b>' + escapeHtml(value) + '</b></div>';
}

/* Opens the report in a hidden iframe and triggers the browser's native print
   dialog (Save as PDF / Android Print Service / Share). Entirely offline.
   Uses iframe instead of window.open() because Android WebView blocks or
   limits new windows, and only captures the first viewport page. The iframe
   stays inside the same WebView document tree so the print adapter sees the
   full multi-page DOM with proper page-break CSS. */
function exportPrintableReport() {
  var html = buildReportHtml(state.data);

  // Android native bridge: if running inside the Android app, use the
  // PrintManager directly for perfect multi-page PDF output.
  if (typeof Android !== "undefined" && Android.printReport) {
    try { Android.printReport(html); showToast("✓ ባለ 9-ገጽ ሪፖርት በAndroid Print Manager ተዘጋጅቷል"); return; }
    catch (e) { /* fallback to iframe */ }
  }

  // Remove any stale print frame
  var oldFrame = document.getElementById('print-frame');
  if (oldFrame) { try { oldFrame.remove(); } catch (e) {} }

  // Create hidden iframe sized to A4 width so WebView print adapter can
  // measure page breaks correctly against the CSS @page size.
  var iframe = document.createElement('iframe');
  iframe.id = 'print-frame';
  iframe.setAttribute('title', 'print-frame');
  iframe.style.cssText = 'position:absolute;top:-9999px;left:-9999px;width:210mm;height:100%;border:none;overflow:visible;';
  document.body.appendChild(iframe);

  var doc = iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();

  // Android WebView needs extra time for layout + fonts before print()
  var isAndroid = /Android/i.test(navigator.userAgent);
  var delay = isAndroid ? 1800 : 600;

  setTimeout(function () {
    try {
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
      showToast("✓ ባለ 9-ገጽ ሪፖርት ተዘጋጅቷል — 'Save as PDF' ወይም 'Share' ይምረጡ");
    } catch (err) {
      console.error('Print failed:', err);
      showToast("ሪፖርት ማዘጋጀት አልተቻለም — እባክዎ እንደገና ይሞክሩ");
    }
    // Cleanup after print dialog has had time to open
    setTimeout(function () {
      var f = document.getElementById('print-frame');
      if (f) { try { f.remove(); } catch (e) {} }
    }, 10000);
  }, delay);
}

    : firebaseState === "error" ? ("⚠️ ግንኙነት አልተሳካም — " + friendlyFirebaseError(firebaseErrorDetail) + (pending > 0 ? (" · " + pending + " በስልኩ ላይ ተቀምጠው ይጠብቃሉ") : ""))
    : (pending > 0 ? ("🟡 ኦፍላይን — " + pending + " መዝገቦች ኢንተርኔት ሲገኝ ይላካሉ") : "የጋራ ዳታቤዝ በመገናኘት ላይ...");
  return el("div", { class: "section", style: { fontSize: "11px", color: firebaseState === "error" ? "#dc2626" : "#64748b", textAlign: "center", padding: "0 8px" } }, [
    el("span", { class: "sync-dot", style: { background: color } }), text
  ]);
}

function openFirebaseSetup() {
  var cfg = loadFirebaseConfig() || {};
  var fields = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId", "shopId"];
  var labels = { apiKey: "apiKey", authDomain: "authDomain", projectId: "projectId", storageBucket: "storageBucket", messagingSenderId: "messagingSenderId", appId: "appId", shopId: "የሱቅ መለያ ኮድ (ሁሉም ስልኮች ተመሳሳይ መስጠት አለባቸው)" };
  var inputs = {};
  var statusBox;
  function drawStatus() {
    if (!statusBox) return;
    clear(statusBox);
    var color = firebaseState === "connected" ? "#16a34a" : firebaseState === "error" ? "#dc2626" : "#b45309";
    var text = firebaseState === "connected" ? "✓ ተገናኝቷል"
      : firebaseState === "error" ? ("✕ ስህተት: " + friendlyFirebaseError(firebaseErrorDetail))
      : firebaseState === "connecting" ? "… በመገናኘት ላይ" : "ገና አልተሞከረም";
    statusBox.appendChild(el("div", { style: { fontSize: "12px", fontWeight: "700", color: color, background: "#f8fafc", padding: "10px", borderRadius: "10px" } }, text));
  }
  openSheet("☁️ የጋራ ዳታቤዝ (Firebase) ማዋቀሪያ", function (body) {
    body.appendChild(el("div", { class: "helpmsg" },
      "ብዙ ስልኮች በ real-time እንዲመሳሰሉ firebase.google.com ላይ ነጻ አካውንት ፈጥረው Firestore Database ያንቁ፣ Project Settings ውስጥ ያለውን የ config ቁጥሮች እዚህ ይለጥፉ። ይህን ካልሞሉ አፕሊኬሽኑ በራሱ በዚህ ስልክ ላይ ብቻ (ያለ ኢንተርኔት) መስራቱን ይቀጥላል።"));
    statusBox = el("div", { class: "mb3" });
    drawStatus();
    body.appendChild(statusBox);
    var testBtn = el("button", { class: "btn btn-outline btn-sm", style: { marginBottom: "12px" } }, "🔄 ግንኙነት አሁን ሞክር");
    testBtn.addEventListener("click", function () { drawStatusConnecting(); initFirebaseIfConfigured(drawStatus); });
    function drawStatusConnecting() { firebaseState = "connecting"; drawStatus(); }
    body.appendChild(testBtn);
    fields.forEach(function (f) {
      var input = el("input", { class: "input", value: cfg[f] || "", placeholder: labels[f] });
      inputs[f] = input;
      body.appendChild(Field(labels[f], f === "apiKey" || f === "shopId", input));
    });
  }, function (close) {
    var row = el("div", { class: "flex gap2" });
    if (cfg.apiKey) {
      var clearBtn = el("button", { class: "btn btn-outline" }, "አላቅ (ኦፍላይን ብቻ ተመለስ)");
      clearBtn.addEventListener("click", function () { saveFirebaseConfig({ disabled: true }); showToast("የጋራ ዳታቤዝ ግንኙነት ተቋርጧል — አሁን ኦፍላይን ብቻ ነው"); location.reload(); });
      row.appendChild(clearBtn);
    }
    var saveBtn = el("button", { class: "btn btn-primary" }, "አገናኝ / አስቀምጥ");
    saveBtn.addEventListener("click", guarded(function () {
      var newCfg = {};
      fields.forEach(function (f) { newCfg[f] = inputs[f].value.trim(); });
      if (!newCfg.apiKey || !newCfg.shopId) { showToast("እባክዎ apiKey እና የሱቅ መለያ ኮድ ያስገቡ"); return; }
      saveFirebaseConfig(newCfg);
      showToast("ተቀምጧል — በመገናኘት ላይ...");
      initFirebaseIfConfigured(drawStatus);
      drawStatus();
      close();
    }));
    row.appendChild(saveBtn);
    return row;
  });
}

/* ================= nav & root ================= */
function BottomNav() {
  var items = [{ key: "dashboard", label: "ዳሽቦርድ", em: "🏠" }, { key: "sales", label: "ሽያጭ", em: "📦" }, { key: "items", label: "ዕቃዎች", em: "🗃️" }, { key: "expenses", label: "ወጪ", em: "💸" }];
  var nav = el("div", { class: "nav" });
  items.forEach(function (it) {
    var active = state.tab === it.key;
    var b = el("button", { class: "navbtn" + (active ? " active" : "") }, [el("span", { class: "em" }, it.em), el("span", { class: "lbl" }, it.label)]);
    b.addEventListener("click", function () { state.tab = it.key; renderApp(); });
    nav.appendChild(b);
  });
  return el("div", { class: "navwrap" }, [nav]);
}

function renderApp() {
  var root = document.getElementById("root");
  clear(root);
  var app = el("div", { class: "app" });
  var hamBtn = el("button", { class: "hamburger" }, "☰");
  hamBtn.addEventListener("click", openMainMenu);
  app.appendChild(el("div", { class: "header" }, [hamBtn, el("h1", {}, "የሱቅ መቆጣጠሪያ ሲስተም"), el("div", { class: "header-spacer" })]));
  if (!storageAvailable) {
    app.appendChild(el("div", { style: { background: "#fff4e5", color: "#92400e", fontSize: "11px", padding: "8px 16px", textAlign: "center" } },
      "ማሳሰቢያ: ውሂብ በዚህ ስልክ ላይ በራስ-ሰር መቀመጥ አልቻለም (ስህተት: " + (storageErrorDetail || "unknown") + ")። Firebase ከተገናኘ ውሂብዎ አይጠፋም፣ ካልሆነ ግን ይህን ገፅ ሲዘጉ ይጠፋል።"));
  }
  var content = el("div", { class: "content" });
  if (state.tab === "dashboard") renderDashboard(content);
  else if (state.tab === "sales") renderSales(content);
  else if (state.tab === "items") renderItems(content);
  else if (state.tab === "expenses") renderExpenses(content);
  else if (state.tab === "reports") renderReports(content);
  else if (state.tab === "profile") renderProfile(content);
  else if (state.tab === "loancenter") renderLoanCenter(content);
  else if (state.tab === "allocgoal") renderAllocationAndGoalPage(content);
  else renderDashboard(content);
  app.appendChild(content);
  app.appendChild(BottomNav());
  root.appendChild(app);
}

/* ================= init (offline-first) =================
   The app renders and is fully usable from localStorage instantly, with
   zero network calls. Firebase sync (optional, only if the user configured
   it) is attempted only when the browser reports connectivity, and is
   retried automatically the moment connectivity returns — so a phone that
   opens this file with no signal never sees a "Failed to fetch" error, and
   syncing only ever happens once a network is actually available. */
renderApp();
initFirebaseIfConfigured();
window.addEventListener("online", function () {
  if (firebaseState === "connected" && hasPendingSync(state.data)) {
    cloudPush(state.data); // already connected — just push what accumulated while offline
  } else if (firebaseState !== "connected") {
    initFirebaseIfConfigured(); // reconnect, which itself pushes pending data (see onSnapshot above)
  }
});
window.addEventListener("offline", function () {
  if (firebaseState === "connecting") { firebaseState = "idle"; renderApp(); }
});
/* ---- Service Worker: makes the HOSTED PAGE ITSELF load offline ----
   localStorage already makes the app's DATA survive offline, but a page
   hosted on GitHub Pages (or any web server) still needs the browser to
   fetch the HTML/JS from the network on every visit unless something
   caches it. A Service Worker is that something: the very first time this
   page loads with internet, the worker below caches it; every visit after
   that — even with zero connectivity — is served straight from that cache,
   which is exactly what turns "net::ERR_INTERNET_DISCONNECTED" into a
   normal, fully-working offline load. This requires sw.js to sit next to
   this HTML file on the server (same folder) — see the accompanying file. */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (err) {
      console.warn("Service worker registration failed (app still works online):", err);
    });
  });
}
/* NOTE: the 9-page bank report is generated and printed/shared entirely
   offline via the browser's own print pipeline (see exportPrintableReport
   below) — no font or library is fetched over the network for it, so there
   is nothing to pre-warm here. The old direct-PDF-download engine
   (pdfMake + a fetched Amharic font) still exists as an optional, clearly
   labeled "requires internet" fallback and is only loaded on demand,
   never automatically at startup. */

})();
</script>
