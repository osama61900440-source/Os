<style>
* { box-sizing: border-box; }
html,body { margin:0; padding:0; background:#F5F7F9; }
body { font-family: -apple-system, "Noto Sans Ethiopic", "Segoe UI", Roboto, Arial, sans-serif; color:#1e293b; -webkit-tap-highlight-color:transparent; }
button { font-family:inherit; cursor:pointer; }

.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap2{gap:8px}.gap3{gap:12px}.flex1{flex:1}.flex-col{flex-direction:column}

.header { display:flex; align-items:center; background:#fff; padding:14px 12px; border-bottom:1px solid #eef1f3; gap:8px; }

.pill.active { background:#1e293b; color:#fff; }

.card { background:#fff; border-radius:14px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); border-left:4px solid #cbd5e1; }
.card.blue { border-color:#3b82f6; } .card.green { border-color:#22c55e; } .card.red { border-color:#ef4444; }

.btn { border:none; border-radius:12px; padding:12px; font-weight:700; font-size:14px; width:100%; }
.btn-primary { background:#2563eb; color:#fff; }

.btn-navy { background:#1e293b; color:#fff; }

.item-row { background:#fff; border:1px solid #eef1f3; border-radius:12px; padding:12px; box-shadow:0 1px 2px rgba(0,0,0,.04); margin-bottom:8px; }

.picker-box { position:relative; }

.navwrap { position:absolute; left:0; right:0; bottom:0; padding:0 12px 12px; }

.overlay { position:fixed; inset:0; z-index:50; display:flex; justify-content:center; }

.sheet { position:relative; width:100%; max-width:448px; background:#fff; margin-top:auto; border-radius:20px 20px 0 0; max-height:92vh; display:flex; flex-direction:column; animation:slideUp .18s ease-out; }

.sheet-header { display:flex; align-items:center; gap:12px; padding:16px 20px; background:#f1f5f9; border-radius:20px 20px 0 0; }
.sheet-back { width:32px; height:32px; border-radius:999px; background:#fff; border:none; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 1px 2px rgba(0,0,0,.08); }
.sheet-body { overflow-y:auto; padding:18px 20px; flex:1; }
.sheet-footer { padding:14px 20px; border-top:1px solid #f1f5f9; }
.sheet h2 { font-size:15px; margin:0; font-weight:800; color:#1e293b; }

.menu-item { display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:#fff; border:1px solid #f1f5f9; border-radius:14px; padding:14px; font-size:14px; font-weight:700; color:#1e293b; margin-bottom:10px; }
.menu-item .em { font-size:20px; }
.menu-item .sub { font-size:11px; color:#94a3b8; font-weight:500; margin-top:2px; }

.errmsg { color:#ef4444; font-size:11.5px; margin-top:4px; }
.helpmsg { color:#94a3b8; font-size:11.5px; margin-bottom:10px; line-height:1.5; }

.alloc-row { display:flex; align-items:center; gap:8px; background:#f8fafc; border-radius:10px; padding:8px; margin-bottom:8px; }
.alloc-name { flex:1.4; } .alloc-pct { width:64px; } .alloc-amt { flex:1; text-align:right; font-weight:700; font-size:13px; color:#1e293b; }

.day-card { background:#fff; border-radius:12px; padding:12px; margin-bottom:8px; border:1px solid #f1f5f9; }
.day-card .dname { font-weight:800; font-size:13px; color:#1e293b; margin-bottom:6px; }
.day-card .row { display:flex; justify-content:space-between; font-size:11.5px; color:#64748b; padding:2px 0; }
.day-card .row b { color:#1e293b; }

.sync-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-inline-end:5px; }

.toast { position:absolute; bottom:96px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; font-size:13px; padding:10px 18px; border-radius:999px; box-shadow:0 8px 20px rgba(0,0,0,.25); z-index:60; }
.empty { text-align:center; color:#94a3b8; font-size:13px; padding:24px 0; }
</style>

<body>
<div id="root"></div>

<script>
(function () {
"use strict";

/* ================= constants & storage keys ================= */
var STORAGE_KEY = "shop-control-data-v5";
var OLD_V4_KEY = "shop-control-data-v4";
var OLD_V3_KEY = "shop-control-data-v3";
var OLD_V2_KEY = "shop-control-data-v2";
var FIREBASE_CFG_KEY = "shop-control-firebase-cfg";
var PERIOD_LABEL = { day: "የቀን", week: "የሳምንት", month: "የወር", year: "የአመት" };
var ETH_MONTHS = ["መስከረም","ጥቅምት","ኅዳር","ታኅሳስ","ጥር","የካቲት","መጋቢት","ሚያዝያ","ግንቦት","ሰኔ","ሐምሌ","ነሐሴ","ጳጉሜን"];
var ETH_WEEKDAYS = ["ሰኞ","ማክሰኞ","ረቡዕ","ሐሙስ","ዓርብ","ቅዳሜ","እሁድ"]; // Monday-first, matches our week range
var EXPENSE_CATEGORIES = ["ኪራይ", "ደመወዝ", "መብራት/ውሃ", "ትራንስፖርት", "ሌላ"];
var BANK_NAMES = ["CBE (ንግድ ባንክ)", "አዋሽ ባንክ", "ዳሸን ባንክ", "አቢሲኒያ ባንክ", "ኦሮሚያ ባንክ", "ሌላ"];

/* ================= tiny DOM helper ================= */
function el(tag, props, children) {
  var e = document.createElement(tag);
  props = props || {};
  for (var k in props) {
    if (!props.hasOwnProperty(k)) continue;
    var v = props[k];
    if (v === undefined || v === null) continue;
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") { for (var s in v) e.style[s] = v[s]; }
    else if (k.indexOf("on") === 0 && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  children = children || [];
  if (!Array.isArray(children)) children = [children];
  children.forEach(function (c) {
    if (c === null || c === undefined || c === false) return;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* local (NOT utc) today, so Ethiopia-timezone users never get a day-shift bug */
function todayISO() {
  var d = new Date();
  var y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}
function toCents(v) { var n = parseFloat(v); if (isNaN(n)) n = 0; return Math.round(n * 100); }
function fmt(cents) {
  cents = Math.round(Number(cents) || 0);
  var neg = cents < 0; cents = Math.abs(cents);
  var whole = Math.floor(cents / 100), frac = cents % 100;
  return (neg ? "-" : "") + whole.toLocaleString("en-US") + "." + String(frac).padStart(2, "0") + " ብር";
}
function daysBetween(iso1, iso2) {
  var a = new Date(iso1 + "T00:00:00"), b = new Date(iso2 + "T00:00:00");
  return Math.max(0, Math.round((b - a) / 86400000));
}

/* ================= double-submit guard =================
   A fast double-tap on mobile can fire two click events before the first
   re-render removes the button. This module-level lock makes every "add"
   action atomic — a second call within the cooldown is simply ignored,
   so a sale/expense/item can never be recorded twice from one tap. */
var submitLock = false;
function guarded(fn) {
  return function () {
    if (submitLock) return;
    submitLock = true;
    try { fn.apply(null, arguments); } finally { setTimeout(function () { submitLock = false; }, 600); }
  };
}

/* ================= Ethiopian calendar (pure math, no network) ================= */
function isGregLeap(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
function ethNewYearGregorianDate(gYear) {
  var day = isGregLeap(gYear + 1) ? 12 : 11;
  return new Date(gYear, 8, day); // September
}
function gregorianToEthiopian(gDate) {
  var gYear = gDate.getFullYear();
  var nyThisG = ethNewYearGregorianDate(gYear);
  var startGYear = gDate >= nyThisG ? gYear : gYear - 1;
  var newYear = ethNewYearGregorianDate(startGYear);
  var diffDays = Math.floor((gDate - newYear) / 86400000);
  var ethYear = startGYear - 7;
  var month = Math.floor(diffDays / 30) + 1;
  var day = (diffDays % 30) + 1;
  return { year: ethYear, month: month, day: day };
}
function ethLabel(y, m) { return ETH_MONTHS[m - 1] + " " + y + " ዓ.ም"; }

/* ================= period range (used by the main dashboard's "today") ================= */
function periodRange(period) {
  var now = new Date(), start;
  if (period === "day") start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  else if (period === "week") { var day = now.getDay(); var diffToMonday = (day + 6) % 7; start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diffToMonday); }
  else if (period === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
  else start = new Date(now.getFullYear(), 0, 1);
  return { start: start.getTime(), end: now.getTime() + 1 };
}
function inPeriod(iso, range) { var t = new Date(iso + "T00:00:00").getTime(); return t >= range.start && t <= range.end; }

/* ================= data model =================
baseCapitalCents : manually editable base (cash/investment not tied to stock)
items[]  : {id,name,costPriceCents,sellPriceCents,openingStock,dateAdded,createdAt}
sales[]  : {id,itemId,itemName,qty,unitPriceCents,unitCostCents,totalCents,customer,date,createdAt}
expenses[]: {id,title,amountCents,date,createdAt}
allocations[]: {id,name,percent}

Every downstream number (stock, capital, revenue, profit, per-day/month/year
totals) is DERIVED from this log each time it's needed — nothing is ever
incremented directly — so numbers can never drift, double-count, or
disagree with each other. */
function freshAllocations() {
  return [
    { id: uid(), name: "ቁጠባ", percent: 10 },
    { id: uid(), name: "ለስራ ካፒታል", percent: 70 },
    { id: uid(), name: "ወጪ", percent: 20 }
  ];
}
function freshData() { return { baseCapitalCents: 0, items: [], sales: [], expenses: [], allocations: freshAllocations(), profile: freshProfile(), loanCenter: freshLoanCenter() }; }
function freshProfile() { return { shopName: "", ownerName: "", email: "", phone: "", tin: "", license: "", businessSector: "", digitalId: "", businessRegistration: "", address: "", managerPhoto: "" }; }
function freshLoanCenter() {
  return {
    requestedAmountCents: 0,
    usageAllocations: [{ id: uid(), purpose: "አዲስ ዕቃ ግዢ", percent: 60 }, { id: uid(), purpose: "ኢንቬንቶሪ ማስፋፊያ", percent: 20 }, { id: uid(), purpose: "ሌላ", percent: 20 }],
    proformaInvoices: [],
    cashFlowProjection: [],
    suppliers: [],
    marketAnalysis: ""
  };
}

function loadData() {
  try {
    var v = localStorage.getItem(STORAGE_KEY);
    if (v) {
      var d = JSON.parse(v);
      if (d && Array.isArray(d.items) && Array.isArray(d.sales) && Array.isArray(d.expenses)) {
        if (!Array.isArray(d.allocations)) d.allocations = freshAllocations();
        if (typeof d.baseCapitalCents !== "number") d.baseCapitalCents = 0;
        if (!d.profile || typeof d.profile !== "object") d.profile = freshProfile();
        else { var fp = freshProfile(); for (var pk in fp) if (!(pk in d.profile)) d.profile[pk] = fp[pk]; }
        if (!d.loanCenter || typeof d.loanCenter !== "object") d.loanCenter = freshLoanCenter();
        else {
          var fl = freshLoanCenter();
          if (typeof d.loanCenter.requestedAmountCents !== "number") d.loanCenter.requestedAmountCents = 0;
          if (!Array.isArray(d.loanCenter.usageAllocations) || d.loanCenter.usageAllocations.length === 0) d.loanCenter.usageAllocations = fl.usageAllocations;
          if (!Array.isArray(d.loanCenter.proformaInvoices)) d.loanCenter.proformaInvoices = [];
          if (!Array.isArray(d.loanCenter.cashFlowProjection)) d.loanCenter.cashFlowProjection = [];
          if (!Array.isArray(d.loanCenter.suppliers)) d.loanCenter.suppliers = [];
          if (typeof d.loanCenter.marketAnalysis !== "string") d.loanCenter.marketAnalysis = "";
        }
        return d;
      }
    }
  } catch (e) {}
  // migrate forward from any earlier version we can find
  var chain = [OLD_V4_KEY, OLD_V3_KEY];
  for (var i = 0; i < chain.length; i++) {
    try {
      var raw = localStorage.getItem(chain[i]);
      if (raw) {
        var o = JSON.parse(raw);
        if (o && Array.isArray(o.items)) {
          return {
            baseCapitalCents: Number(o.baseCapitalCents || o.openingCapitalCents) || 0,
            items: o.items || [], sales: o.sales || [], expenses: o.expenses || [],
            allocations: (Array.isArray(o.allocations) && o.allocations.length) ? o.allocations : freshAllocations(),
            profile: freshProfile(), loanCenter: freshLoanCenter()
          };
        }
      }
    } catch (e) {}
  }
  try {
    var v2 = localStorage.getItem(OLD_V2_KEY);
    if (v2) {
      var o2 = JSON.parse(v2);
      if (o2 && Array.isArray(o2.items)) {
        return {
          baseCapitalCents: toCents(o2.capital || 0),
          items: (o2.items || []).map(function (it) {
            return { id: it.id || uid(), name: it.name, sellPriceCents: toCents(it.price), costPriceCents: 0, openingStock: Number(it.stock) || 0, dateAdded: todayISO(), createdAt: Date.now() };
          }),
          sales: [], expenses: [], allocations: freshAllocations(), profile: freshProfile(), loanCenter: freshLoanCenter()
        };
      }
    }
  } catch (e) {}
  return freshData();
}
var storageAvailable = true;
var storageErrorDetail = "";
function saveLocal(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); storageAvailable = true; } catch (e) { storageAvailable = false; storageErrorDetail = (e && e.message) ? e.message : String(e); } }

/* ================= derived calculations ================= */
function itemStock(data, itemId) {
  var item = data.items.find(function (i) { return i.id === itemId; });
  if (!item) return 0;
  var sold = data.sales.filter(function (s) { return s.itemId === itemId; }).reduce(function (s, x) { return s + x.qty; }, 0);
  return item.openingStock - sold;
}
function itemSoldOutInfo(data, item) {
  var stock = itemStock(data, item.id);
  if (stock > 0) return { soldOut: false, daysSoFar: daysBetween(item.dateAdded, todayISO()) };
  var salesForItem = data.sales.filter(function (s) { return s.itemId === item.id; }).slice().sort(function (a, b) { return a.createdAt - b.createdAt; });
  var cum = 0, soldOutDate = null;
  for (var i = 0; i < salesForItem.length; i++) {
    cum += salesForItem[i].qty;
    if (cum >= item.openingStock) { soldOutDate = salesForItem[i].date; break; }
  }
  if (!soldOutDate) return { soldOut: false, daysSoFar: daysBetween(item.dateAdded, todayISO()) };
  return { soldOut: true, soldOutDate: soldOutDate, days: daysBetween(item.dateAdded, soldOutDate) };
}
function lineProfitCents(sale) { return (sale.unitPriceCents - sale.unitCostCents) * sale.qty; }
function inventoryValueCents(data) {
  return data.items.reduce(function (s, it) { return s + Math.max(0, itemStock(data, it.id)) * it.costPriceCents; }, 0);
}
function totalCapitalCents(data) { return data.baseCapitalCents + inventoryValueCents(data); }
/* stock/capital as of a cutoff date — used only for the "value at start of
   this Ethiopian year vs now" comparison on the PDF report. Same derivation
   principle as the live numbers, just filtered to a date range, so it can
   never disagree with the live totals when the cutoff is "today". */
function itemStockAsOf(data, itemId, cutoffISO) {
  var item = data.items.find(function (i) { return i.id === itemId; });
  if (!item) return 0;
  var sold = data.sales.filter(function (s) { return s.itemId === itemId && s.date <= cutoffISO; }).reduce(function (s, x) { return s + x.qty; }, 0);
  return item.openingStock - sold;
}
function inventoryValueAsOf(data, cutoffISO) {
  return data.items.filter(function (it) { return it.dateAdded <= cutoffISO; })
    .reduce(function (s, it) { return s + Math.max(0, itemStockAsOf(data, it.id, cutoffISO)) * it.costPriceCents; }, 0);
}
function capitalAsOf(data, cutoffISO) { return data.baseCapitalCents + inventoryValueAsOf(data, cutoffISO); }

function statsFor(sales, expenses) {
  var revenue = sales.reduce(function (s, x) { return s + x.totalCents; }, 0);
  var expenseTotal = expenses.reduce(function (s, x) { return s + x.amountCents; }, 0);
  var profit = sales.reduce(function (s, x) { return s + lineProfitCents(x); }, 0) - expenseTotal;
  var counts = {};
  sales.forEach(function (s) { counts[s.itemName] = (counts[s.itemName] || 0) + s.qty; });
  var topName = null, topQty = 0;
  Object.keys(counts).forEach(function (n) { if (counts[n] > topQty) { topQty = counts[n]; topName = n; } });
  return { revenue: revenue, expenseTotal: expenseTotal, profit: profit, topName: topName, topQty: topQty };
}
/* Cash / bank-transfer / on-credit split — every sale is counted in exactly
   one bucket (whatever it was tagged with), so the three always sum back
   to total revenue exactly. Sales recorded before this feature existed
   have no paymentMethod field and default safely to "cash". */
function paymentBreakdown(sales) {
  var cash = 0, bank = 0, credit = 0, creditOutstanding = 0, creditCollected = 0;
  sales.forEach(function (s) {
    var m = s.paymentMethod || "cash";
    if (m === "bank") bank += s.totalCents;
    else if (m === "credit") { credit += s.totalCents; if (s.paid) creditCollected += s.totalCents; else creditOutstanding += s.totalCents; }
    else cash += s.totalCents;
  });
  return { cash: cash, bank: bank, credit: credit, creditOutstanding: creditOutstanding, creditCollected: creditCollected };
}
function expenseByCategory(expenses) {
  var map = {};
  expenses.forEach(function (e) { var c = e.category || "ሌላ"; map[c] = (map[c] || 0) + e.amountCents; });
  return map;
}
/* "customer traffic" — we don't track unique customer identity reliably (many
   walk-in sales share no phone/ID), so the honest, defensible proxy for a
   bank report is the number of separate sales transactions. Clearly labeled
   as such wherever it's shown so it's never mistaken for verified footfall. */
function transactionCount(sales) { return sales.length; }
/* Reconciliation check: cash + bank + credit must equal total revenue.
   Because every sale is derived and counted in exactly one bucket, this is
   true by construction — but we still compute and display it explicitly so
   the figure is auditable, and so it would visibly flag if data were ever
   corrupted (e.g. a manually edited Firestore document). */
function verifyPaymentReconciliation(sales) {
  var pay = paymentBreakdown(sales);
  var total = sales.reduce(function (s, x) { return s + x.totalCents; }, 0);
  var sumOfMethods = pay.cash + pay.bank + pay.credit;
  return { ok: sumOfMethods === total, total: total, sumOfMethods: sumOfMethods, pay: pay };
}
function periodStats(data, period) {
  var range = periodRange(period);
  var sales = data.sales.filter(function (s) { return inPeriod(s.date, range); });
  var expenses = data.expenses.filter(function (e) { return inPeriod(e.date, range); });
  var st = statsFor(sales, expenses);
  st.salesInPeriod = sales; st.expensesInPeriod = expenses;
  return st;
}
function dayStats(data, iso) {
  return statsFor(data.sales.filter(function (s) { return s.date === iso; }), data.expenses.filter(function (e) { return e.date === iso; }));
}
/* group EVERY sale/expense once into Ethiopian year+month buckets — single pass, single source */
function ethiopianBuckets(data) {
  var map = {}; // key "y-m" -> {sales:[], expenses:[]}
  function bucketFor(iso) {
    var e = gregorianToEthiopian(new Date(iso + "T00:00:00"));
    var key = e.year + "-" + e.month;
    if (!map[key]) map[key] = { year: e.year, month: e.month, sales: [], expenses: [] };
    return map[key];
  }
  data.sales.forEach(function (s) { bucketFor(s.date).sales.push(s); });
  data.expenses.forEach(function (e) { bucketFor(e.date).expenses.push(e); });
  return map;
}

/* ================= sheet / modal ================= */
function openSheet(title, bodyBuilder, footerBuilder) {
  var overlay = el("div", { class: "overlay" });
  var bg = el("div", { class: "overlay-bg", onclick: close });
  var body = el("div", { class: "sheet-body" });
  var footerWrap = el("div", { class: "sheet-footer" });
  var sheetEl = el("div", { class: "sheet" }, [
    el("div", { class: "sheet-header" }, [
      el("button", { class: "sheet-back", onclick: close }, "‹"),
      el("h2", {}, title)
    ]),
    body, footerWrap
  ]);
  overlay.appendChild(bg); overlay.appendChild(sheetEl);
  function close() { overlay.remove(); }
  function refreshFooter() { clear(footerWrap); if (footerBuilder) footerWrap.appendChild(footerBuilder(close, refreshFooter)); }
  bodyBuilder(body, close, refreshFooter);
  if (footerBuilder) refreshFooter(); else footerWrap.remove();
  document.querySelector(".app").appendChild(overlay);
  return { close: close };
}
function Field(labelText, required, inputEl) {
  return el("div", { class: "field" }, [el("label", {}, labelText + (required ? " *" : "")), inputEl]);
}

/* ================= allocation renderer (guarded against zero/negative profit) ================= */
function renderAllocationBlock(profitCents, allocations, periodLabel) {
  var wrap = el("div", {});
  wrap.appendChild(el("div", { style: { fontSize: "11px", color: "#94a3b8", marginBottom: "8px" } },
    periodLabel + " ትርፍ (" + fmt(profitCents) + ")"));

    wrap.appendChild(el("div", { style: { fontSize: "12px", color: "#b45309", background: "#fffbeb", padding: "10px", borderRadius: "10px" } },
      "⚠️ በዚህ ጊዜ ውስጥ ትርፍ ስላልተገኘ (" + fmt(profitCents) + ") የትርፍ ክፍፍል አይሰላም። ኪሳራ/ወጪ በመቶኛ መከፋፈል ትክክል ስላልሆነ ተትቷል።"));

  }
  return wrap;
}

function openEditSaleModal(sale) {

  openSheet("ሽያጭ አርም", function (body) {
    body.appendChild(el("div", { class: "helpmsg" }, sale.itemName + " — ስቶክና ካፒታል ራሳቸው ከዚህ ለውጥ ጋር ይስተካከላሉ።"));

        return d;

      close();
    }));
    return btn;
  });

/* ---- Page Constants ---- */
var PAGE_W = 210;   // A4 width mm
var PAGE_H = 297;   // A4 height mm
var MARGIN = 50;    // ~17.6mm (50pt)
var CONTENT_W = PAGE_W - (MARGIN * 2 / 2.835); // content width in mm

/* ---- jsPDF Helpers ---- */
function mmToPt(mm) { return mm * 2.835; }
function ptToMm(pt) { return pt / 2.835; }

/* ---- Text Wrapping for Amharic ---- */
function wrapText(doc, text, maxWidth) {
  var words = text.split(/\s+/);
  var lines = [];
  var currentLine = "";
  words.forEach(function(word) {
    var test = currentLine ? currentLine + " " + word : word;
    if (doc.getTextWidth(test) > maxWidth) {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    } else {
      currentLine = test;
    }
  });
  if (currentLine) lines.push(currentLine);
  return lines.length ? lines : [text];
}

/* ---- Safe Text Rendering ---- */
function safeText(doc, text, x, y, options) {
  options = options || {};
  var str = String(text || "-");
  // Replace problematic characters for jsPDF
  str = str.replace(/[\x00-\x1F\x7F]/g, "");
  doc.text(str, x, y, options);
}

/* ---- Page Setup ---- */
function setupPage(doc, pageNum, totalPages, shopName) {
  // Footer line
  doc.setDrawColor(COLORS.lightGray[0], COLORS.lightGray[1], COLORS.lightGray[2]);
  doc.setLineWidth(0.3);
  doc.line(MARGIN / 2.835, FOOTER_Y, (PAGE_W - MARGIN / 2.835), FOOTER_Y);

  // Footer text
  doc.setFontSize(8);
  doc.setTextColor(COLORS.gray[0], COLORS.gray[1], COLORS.gray[2]);
  var footerText = "ገጽ " + pageNum + " / " + totalPages + "  |  " + (shopName || "የሱቅ መቆጣጠሪያ ሲስተም") + "  |  በራስ-ሰር ከንግድ ስራው መዝገብ የተዘጋጀ";
  doc.text(footerText, PAGE_W / 2, FOOTER_Y + 6, { align: "center" });

/* ---- Section Title ---- */
function drawSectionTitle(doc, y, title, subtitle) {
  y = ensureSpace(doc, y, subtitle ? 18 : 12);

  // Accent bar
  doc.setFillColor(COLORS.navy[0], COLORS.navy[1], COLORS.navy[2]);
  doc.rect(MARGIN / 2.835, y - 4, 3, 10, "F");

  doc.setFontSize(14);
  doc.setTextColor(COLORS.navy[0], COLORS.navy[1], COLORS.navy[2]);
  doc.setFont("helvetica", "bold");

/* ---- Key-Value Row ---- */

  var valueX = MARGIN / 2.835 + 75;
  var maxWidth = (PAGE_W - MARGIN / 2.835) - valueX - 5;

  doc.setFontSize(10);
  doc.setTextColor(COLORS.slateLight[0], COLORS.slateLight[1], COLORS.slateLight[2]);
  doc.setFont("helvetica", "normal");
  safeText(doc, label, labelX, y);

  // Value
  var color = options.color || COLORS.slate;
  doc.setTextColor(color[0], color[1], color[2]);
  doc.setFont("helvetica", options.bold ? "bold" : "normal");

  var valStr = String(value || "-");
  if (doc.getTextWidth(valStr) > maxWidth) {
    var lines = wrapText(doc, valStr, maxWidth);
    lines.forEach(function(line, i) {
      safeText(doc, line, valueX, y + (i * 5));
    });
    y += (lines.length - 1) * 5;
  } else {
    safeText(doc, valStr, valueX, y);
  }

  doc.setFont("helvetica", "normal");
  doc.setTextColor(COLORS.slate[0], COLORS.slate[1], COLORS.slate[2]);
  return y + 8;
}

/* ---- Professional Table ---- */
function drawTable(doc, y, headers, rows, colWidths, options) {
  options = options || {};
  var rowHeight = options.rowHeight || 8;
  var headerHeight = options.headerHeight || 10;
  var padding = options.padding || 3;
  var startX = MARGIN / 2.835;
  var totalW = colWidths.reduce(function(a, b) { return a + b; }, 0);

  y = ensureSpace(doc, y, headerHeight + 4);

  // Header background
  doc.setFillColor(COLORS.navy[0], COLORS.navy[1], COLORS.navy[2]);
  doc.roundedRect(startX, y - headerHeight + 2, totalW, headerHeight, 2, 2, "F");

  // Header text
  doc.setFontSize(9);
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "bold");
  var cx = startX + padding;
  headers.forEach(function(h, i) {
    safeText(doc, h, cx + 2, y - 2);
    cx += colWidths[i];
  });

  y += 4;
  doc.setTextColor(COLORS.slate[0], COLORS.slate[1], COLORS.slate[2]);
  doc.setFont("helvetica", "normal");

  // Rows
  rows.forEach(function(row, rIdx) {
    y = ensureSpace(doc, y, rowHeight + 2);

    // Alternating background
    if (rIdx % 2 === 0) {
      doc.setFillColor(250, 251, 252);
      doc.rect(startX, y - rowHeight + 3, totalW, rowHeight, "F");
    }

    // Row border
    doc.setDrawColor(COLORS.lightGray[0], COLORS.lightGray[1], COLORS.lightGray[2]);
    doc.setLineWidth(0.2);
    doc.line(startX, y + 1, startX + totalW, y + 1);

    cx = startX + padding;
    row.forEach(function(cell, cIdx) {
      var cellColor = options.rowColors && options.rowColors[rIdx] && options.rowColors[rIdx][cIdx] 
        ? options.rowColors[rIdx][cIdx] : COLORS.slate;
      doc.setTextColor(cellColor[0], cellColor[1], cellColor[2]);
      if (options.boldCol && options.boldCol.indexOf(cIdx) !== -1) {
        doc.setFont("helvetica", "bold");
      }
      safeText(doc, String(cell || "-"), cx + 2, y - 1);
      doc.setFont("helvetica", "normal");
      cx += colWidths[cIdx];
    });

    y += rowHeight;
  });

  return y + 4;
}

/* ---- Two-Column Comparison Table ---- */
function drawComparisonTable(doc, y, title, leftLabel, leftValue, rightLabel, rightValue, diffLabel, diffValue, diffPositive) {

/* ---- Pie Chart ---- */
function drawPieChart(doc, x, y, size, segments, labels) {
  var canvas = document.createElement("canvas");
  canvas.width = size * 4;
  canvas.height = size * 4;
  var ctx = canvas.getContext("2d");
  var scale = 4;
  var cx = size * scale / 2;
  var cy = size * scale / 2;
  var r = size * scale / 2 - 10;

  var total = segments.reduce(function(s, seg) { return s + Math.max(0, seg); }, 0);

  if (total <= 0) {
    ctx.fillStyle = "#e2e8f0";
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.fill();
  } else {
    var start = -Math.PI / 2;
    segments.forEach(function(seg, i) {
      var angle = (Math.max(0, seg) / total) * 2 * Math.PI;
      var c = COLORS.pieColors[i % COLORS.pieColors.length];
      ctx.fillStyle = "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")";
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, start + angle);
      ctx.closePath();
      ctx.fill();
      // White border between segments
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.stroke();
      start += angle;
    });
    // Inner white circle for donut effect
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.45, 0, 2 * Math.PI);
    ctx.fill();
  }

  var dataUrl = canvas.toDataURL("image/png");
  try {
    doc.addImage(dataUrl, "PNG", x, y - size/2, size, size);
  } catch (e) {
    // Fallback: draw simple circle
    doc.setDrawColor(COLORS.lightGray[0], COLORS.lightGray[1], COLORS.lightGray[2]);
    doc.setLineWidth(1);
    doc.circle(x + size/2, y, size/2 - 2, "S");
  }

  // Legend
  var legendY = y + size/2 + 8;
  var legendX = x;
  segments.forEach(function(seg, i) {
    if (seg <= 0) return;
    var c = COLORS.pieColors[i % COLORS.pieColors.length];
    doc.setFillColor(c[0], c[1], c[2]);
    doc.rect(legendX, legendY - 3, 4, 4, "F");
    doc.setFontSize(8);
    doc.setTextColor(COLORS.slateLight[0], COLORS.slateLight[1], COLORS.slateLight[2]);
    var pct = total > 0 ? Math.round((seg / total) * 100) + "%" : "0%";
    safeText(doc, (labels[i] || "") + " " + pct, legendX + 7, legendY);
    legendY += 6;
  });

  return legendY + 4;
}

/* ---- Bar Chart (Simple) ---- */
function drawBarChart(doc, x, y, w, h, labels, values, maxValue) {
  if (!maxValue) maxValue = Math.max.apply(null, values.concat([1]));
  var barW = (w - 20) / values.length;
  var chartH = h - 20;

  // Axis
  doc.setDrawColor(COLORS.lightGray[0], COLORS.lightGray[1], COLORS.lightGray[2]);
  doc.setLineWidth(0.3);
  doc.line(x, y, x, y - chartH);
  doc.line(x, y, x + w - 20, y);

  values.forEach(function(v, i) {
    var barH = (v / maxValue) * chartH;
    var barX = x + 10 + i * barW + barW * 0.2;
    var barWidth = barW * 0.6;

    // Bar
    var c = COLORS.pieColors[i % COLORS.pieColors.length];
    doc.setFillColor(c[0], c[1], c[2]);
    doc.roundedRect(barX, y - barH, barWidth, barH, 1, 1, "F");

    // Label
    doc.setFontSize(7);
    doc.setTextColor(COLORS.slateLight[0], COLORS.slateLight[1], COLORS.slateLight[2]);
    safeText(doc, labels[i] || "", barX + barWidth/2, y + 5, { align: "center" });

    // Value on top
    if (barH > 10) {
      doc.setFontSize(7);
      doc.setTextColor(255, 255, 255);
      safeText(doc, String(v), barX + barWidth/2, y - barH + 8, { align: "center" });
    }
  });

  return y + 15;
}

/* ---- Ensure Space (page break) ---- */
function ensureSpace(doc, y, needed) {
  if (y + needed > FOOTER_Y - 15) {
    doc.addPage();
    return 20;
  }
  return y;
}

function openWeeklyReport() {
  openSheet("📅 ሳምንታዊ ሪፖርት", function (body) {
    var now = new Date();
    var day = now.getDay(), diffToMonday = (day + 6) % 7;
    var monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diffToMonday);
    var isoList = [];
    for (var j = 0; j < 7; j++) {
      var dd = new Date(monday); dd.setDate(monday.getDate() + j);
      var iso = dd.getFullYear() + "-" + String(dd.getMonth() + 1).padStart(2, "0") + "-" + String(dd.getDate()).padStart(2, "0");
      isoList.push({ iso: iso, label: ETH_WEEKDAYS[j] });
    }
    var weekSales = state.data.sales.filter(function (s) { return isoList.some(function (x) { return x.iso === s.date; }); });
    var weekExpenses = state.data.expenses.filter(function (e) { return isoList.some(function (x) { return x.iso === e.date; }); });
    var weekTotals = statsFor(weekSales, weekExpenses);
    body.appendChild(el("div", { class: "card violet section" }, [el("div", { class: "card-label" }, "የሳምንቱ ጠቅላላ ትርፍ"), el("div", { class: "card-value" }, fmt(weekTotals.profit))]));
    body.appendChild(renderAllocationBlock(weekTotals.profit, state.data.allocations, "የሳምንቱ"));
    body.appendChild(el("div", { class: "eyebrow mt3 mb2" }, "በቀናት"));
    isoList.forEach(function (x) {
      var st = dayStats(state.data, x.iso);
      body.appendChild(el("div", { class: "day-card" }, [
        el("div", { class: "dname" }, x.label + " (" + x.iso + ")"),
        el("div", { class: "row" }, [el("span", {}, "ሽያጭ"), el("b", {}, fmt(st.revenue))]),
        el("div", { class: "row" }, [el("span", {}, "ወጪ"), el("b", {}, fmt(st.expenseTotal))]),
        el("div", { class: "row" }, [el("span", {}, "ትርፍ"), el("b", { style: { color: st.profit >= 0 ? "#16a34a" : "#dc2626" } }, fmt(st.profit))])
      ]));
    });
  }, null);
}

function openMonthlyReport() {
  openSheet("🗓️ ወርሃዊ ሪፖርት", function (body) {
    var buckets = ethiopianBuckets(state.data);
    var todayEth = gregorianToEthiopian(new Date());
    body.appendChild(el("div", { class: "eyebrow mb2" }, todayEth.year + " ዓ.ም — 13ቱ ወራት"));

      body.appendChild(el("div", { class: "day-card" }, [
        el("div", { class: "dname" }, ETH_MONTHS[m - 1]),

        el("div", { class: "row" }, [el("span", {}, "ትርፍ"), el("b", { style: { color: st.profit >= 0 ? "#16a34a" : "#dc2626" } }, fmt(st.profit))])
      ]));
    }
  }, null);
}

function openYearlyReport() {
  openSheet("📆 አመታዊ ሪፖርት", function (body) {
    var buckets = ethiopianBuckets(state.data);
    var yearMap = {};
    Object.keys(buckets).forEach(function (k) {
      var b = buckets[k];
      if (!yearMap[b.year]) yearMap[b.year] = { sales: [], expenses: [] };
      yearMap[b.year].sales = yearMap[b.year].sales.concat(b.sales);
      yearMap[b.year].expenses = yearMap[b.year].expenses.concat(b.expenses);
    });
    var todayEth = gregorianToEthiopian(new Date());
    if (!yearMap[todayEth.year]) yearMap[todayEth.year] = { sales: [], expenses: [] };
    var years = Object.keys(yearMap).map(Number).sort(function (a, b) { return b - a; });
    years.forEach(function (y) {
      var st = statsFor(yearMap[y].sales, yearMap[y].expenses);
      body.appendChild(el("div", { class: "day-card" }, [
        el("div", { class: "dname" }, y + " ዓ.ም"),
        el("div", { class: "row" }, [el("span", {}, "ሽያጭ"), el("b", {}, fmt(st.revenue))]),
        el("div", { class: "row" }, [el("span", {}, "ወጪ"), el("b", {}, fmt(st.expenseTotal))]),
        el("div", { class: "row" }, [el("span", {}, "ትርፍ"), el("b", { style: { color: st.profit >= 0 ? "#16a34a" : "#dc2626" } }, fmt(st.profit))])
      ]));
    });
  }, null);
}

var firebaseReady = false, firebaseDb = null, firebaseDocPath = null, firebaseApplyingRemote = false;
var firebaseState = "idle"; // idle | connecting | connected | error
var firebaseErrorDetail = "";
/* Default config supplied by the shop owner — baked in so every phone that
   opens this same file auto-connects to the same shared shop without
   anyone needing to retype it. Still editable via ☰ → ☁️ if ever needed. */
var DEFAULT_FIREBASE_CONFIG = {

  projectId: "seniy-624d6",

function loadFirebaseConfig() {
  try {
    var v = localStorage.getItem(FIREBASE_CFG_KEY);
    if (v) { var parsed = JSON.parse(v); return parsed && parsed.disabled ? null : parsed; }
  } catch (e) {}
  return DEFAULT_FIREBASE_CONFIG;
}
function saveFirebaseConfig(cfg) { try { localStorage.setItem(FIREBASE_CFG_KEY, JSON.stringify(cfg)); } catch (e) {} }

function injectScript(src) {
  return new Promise(function (resolve, reject) {
    var existing = document.querySelector('script[src="' + src + '"]');
    if (existing) { resolve(); return; }
    var s = document.createElement("script");
    s.src = src; s.onload = resolve; s.onerror = function () { reject(new Error("script load failed: " + src)); };
    document.head.appendChild(s);
  });
}
function friendlyFirebaseError(code) {
  if (!code) return "";
  if (code.indexOf("permission-denied") !== -1) return "ፈቃድ የለም — Firestore Rules ውስጥ 'Publish' መደረጉን ያረጋግጡ (☰ → ☁️ ላይ ያለውን rules እንደገና ይለጥፉ)።";
  if (code.indexOf("not-found") !== -1 || code.indexOf("unavailable") !== -1) return "Firestore Database አልተፈጠረም — Firebase Console → Firestore Database → Create database ይጫኑ።";
  if (code.indexOf("network") !== -1 || code === "TypeError: Failed to fetch") return "የኢንተርኔት ግንኙነት ችግር አለ — ይሞክሩ እንደገና ኢንተርኔት ካገኙ በኋላ።";
  return code;
}
var firebaseUnsubscribe = null;
function initFirebaseIfConfigured(onDone) {
  var cfg = loadFirebaseConfig();
  if (!cfg || !cfg.apiKey || !cfg.shopId) { firebaseState = "idle"; if (onDone) onDone(); return; }
  firebaseState = "connecting"; firebaseErrorDetail = "";
  renderApp();
  injectScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js")
    .then(function () { return injectScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"); })
    .then(function () {
      try {
        if (!firebaseDb) {
          try { firebase.initializeApp(cfg); } catch (e) { /* already initialized — fine */ }
          firebaseDb = firebase.firestore();
          /* NOTE: we deliberately do NOT call enablePersistence() here.
             Firestore's IndexedDB offline-persistence layer is the known
             cause of "FIRESTORE INTERNAL ASSERTION FAILED: Unexpected
             state" inside restrictive in-app browsers (TikTok/Facebook/etc
             WebViews have broken IndexedDB support). Our app already keeps
             its own localStorage cache for offline use, so we don't need
             Firestore's built-in persistence and avoid this whole bug class. */
        }
        if (firebaseUnsubscribe) { firebaseUnsubscribe(); firebaseUnsubscribe = null; }
        firebaseDocPath = firebaseDb.collection("shops").doc(cfg.shopId);
        firebaseDb.runTransaction(function (tx) {
          return tx.get(firebaseDocPath).then(function (docSnap) {
            if (!docSnap.exists) tx.set(firebaseDocPath, state.data);
          });
        }).catch(function (err) {
          firebaseState = "error"; firebaseErrorDetail = (err && err.code) || (err && err.message) || String(err);
          renderApp();
        });
        firebaseUnsubscribe = firebaseDocPath.onSnapshot(function (docSnap) {
          firebaseState = "connected"; firebaseReady = true; firebaseErrorDetail = "";
          if (docSnap.exists) {
            var remote = docSnap.data();
            if (remote && Array.isArray(remote.items)) {
              firebaseApplyingRemote = true;
              state.data = remote;
              saveLocal(state.data);
              firebaseApplyingRemote = false;
            }
          }
          renderApp();
          if (onDone) onDone();
        }, function (err) {
          firebaseState = "error"; firebaseReady = false;
          firebaseErrorDetail = (err && err.code) || (err && err.message) || String(err);
          renderApp();
          if (onDone) onDone();
        });
      } catch (err) {
        firebaseState = "error"; firebaseReady = false;
        firebaseErrorDetail = (err && err.message) || String(err);
        renderApp();
        if (onDone) onDone();
      }
    })
    .catch(function (err) {
      firebaseState = "error"; firebaseReady = false;
      firebaseErrorDetail = (err && err.message) || String(err);
      renderApp();
      if (onDone) onDone();
    });
}
function cloudPush(data) {
  if (!firebaseReady || !firebaseDocPath || firebaseApplyingRemote) return;
  firebaseDocPath.set(data).catch(function (err) {
    firebaseState = "error"; firebaseErrorDetail = (err && err.code) || (err && err.message) || String(err);
    renderApp();
  });
}
function cloudStatus() {
  var cfg = loadFirebaseConfig();
  if (!cfg) return null;
  var color = firebaseState === "connected" ? "#22c55e" : firebaseState === "error" ? "#ef4444" : "#f59e0b";
  var text = firebaseState === "connected" ? ("የጋራ ዳታቤዝ ተገናኝቷል (ሱቅ: " + cfg.shopId + ")")
    : firebaseState === "error" ? ("⚠️ ግንኙነት አልተሳካም — " + friendlyFirebaseError(firebaseErrorDetail))

  return el("div", { class: "section", style: { fontSize: "11px", color: firebaseState === "error" ? "#dc2626" : "#64748b", textAlign: "center", padding: "0 8px" } }, [
    el("span", { class: "sync-dot", style: { background: color } }), text
  ]);
}

function openFirebaseSetup() {
  var cfg = loadFirebaseConfig() || {};
  var fields = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId", "shopId"];
  var labels = { apiKey: "apiKey", authDomain: "authDomain", projectId: "projectId", storageBucket: "storageBucket", messagingSenderId: "messagingSenderId", appId: "appId", shopId: "የሱቅ መለያ ኮድ (ሁሉም ስልኮች ተመሳሳይ መስጠት አለባቸው)" };
  var inputs = {};
  var statusBox;
  function drawStatus() {
    if (!statusBox) return;
    clear(statusBox);
    var color = firebaseState === "connected" ? "#16a34a" : firebaseState === "error" ? "#dc2626" : "#b45309";
    var text = firebaseState === "connected" ? "✓ ተገናኝቷል"
      : firebaseState === "error" ? ("✕ ስህተት: " + friendlyFirebaseError(firebaseErrorDetail))

  }
  openSheet("☁️ የጋራ ዳታቤዝ (Firebase) ማዋቀሪያ", function (body) {
    body.appendChild(el("div", { class: "helpmsg" },
      "ብዙ ስልኮች በ real-time እንዲመሳሰሉ firebase.google.com ላይ ነጻ አካውንት ፈጥረው Firestore Database ያንቁ፣ Project Settings ውስጥ ያለውን የ config ቁጥሮች እዚህ ይለጥፉ። ይህን ካልሞሉ አፕሊኬሽኑ በራሱ በዚህ ስልክ ላይ ብቻ (ያለ ኢንተርኔት) መስራቱን ይቀጥላል።"));

    testBtn.addEventListener("click", function () { drawStatusConnecting(); initFirebaseIfConfigured(drawStatus); });

    body.appendChild(testBtn);
    fields.forEach(function (f) {
      var input = el("input", { class: "input", value: cfg[f] || "", placeholder: labels[f] });

    var row = el("div", { class: "flex gap2" });
    if (cfg.apiKey) {
      var clearBtn = el("button", { class: "btn btn-outline" }, "አላቅ (ኦፍላይን ብቻ ተመለስ)");
      clearBtn.addEventListener("click", function () { saveFirebaseConfig({ disabled: true }); showToast("የጋራ ዳታቤዝ ግንኙነት ተቋርጧል — አሁን ኦፍላይን ብቻ ነው"); location.reload(); });
      row.appendChild(clearBtn);
    }
    var saveBtn = el("button", { class: "btn btn-primary" }, "አገናኝ / አስቀምጥ");
    saveBtn.addEventListener("click", guarded(function () {

/* ================= nav & root ================= */
function BottomNav() {
  var items = [{ key: "dashboard", label: "ዳሽቦርድ", em: "🏠" }, { key: "sales", label: "ሽያጭ", em: "📦" }, { key: "items", label: "ዕቃዎች", em: "🗃️" }, { key: "expenses", label: "ወጪ", em: "💸" }, { key: "reports", label: "ሪፖርት", em: "📊" }];
  var nav = el("div", { class: "nav" });
  items.forEach(function (it) {
    var active = state.tab === it.key;
    var b = el("button", { class: "navbtn" + (active ? " active" : "") }, [el("span", { class: "em" }, it.em), el("span", { class: "lbl" }, it.label)]);
    b.addEventListener("click", function () { state.tab = it.key; renderApp(); });
    nav.appendChild(b);
  });
  return el("div", { class: "navwrap" }, [nav]);
}

function renderApp() {
  var root = document.getElementById("root");
  clear(root);
  var app = el("div", { class: "app" });
  var hamBtn = el("button", { class: "hamburger" }, "☰");
  hamBtn.addEventListener("click", openMainMenu);
  app.appendChild(el("div", { class: "header" }, [hamBtn, el("h1", {}, "የሱቅ መቆጣጠሪያ ሲስተም"), el("div", { class: "header-spacer" })]));
  if (!storageAvailable) {
    app.appendChild(el("div", { style: { background: "#fff4e5", color: "#92400e", fontSize: "11px", padding: "8px 16px", textAlign: "center" } },
      "ማሳሰቢያ: ውሂብ በዚህ ስልክ ላይ በራስ-ሰር መቀመጥ አልቻለም (ስህተት: " + (storageErrorDetail || "unknown") + ")። Firebase ከተገናኘ ውሂብዎ አይጠፋም፣ ካልሆነ ግን ይህን ገፅ ሲዘጉ ይጠፋል።"));
  }
  var content = el("div", { class: "content" });
  if (state.tab === "dashboard") renderDashboard(content);
  else if (state.tab === "sales") renderSales(content);
  else if (state.tab === "items") renderItems(content);
  else if (state.tab === "expenses") renderExpenses(content);
  else if (state.tab === "reports") renderReports(content);
  else if (state.tab === "profile") renderProfile(content);
  else if (state.tab === "loancenter") renderLoanCenter(content);
  app.appendChild(content);
  app.appendChild(BottomNav());
  root.appendChild(app);
}

/* ================= init ================= */
renderApp();
initFirebaseIfConfigured();

})();
