<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>የሱቅ መቆጣጠሪያ ሲስተም</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Business%20Tracker%22,%22short_name%22:%22Tracker%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23F5F7F9%22,%22theme_color%22:%22%23123A5E%22,%22description%22:%22የሱቅ%20መቆጣጠሪያ%20እና%20የሂሳብ%20መመዝገቢያ%22}" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Noto Sans Ethiopic", "Segoe UI", Roboto, sans-serif; margin:0; background-color: #F5F7F9; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "shop-control-data-v2";
const fmt = (n) => (Number(n) || 0).toLocaleString("en-US") + " ብር";

function App() {
  const [data, setData] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try { return JSON.parse(saved); } catch(e) {}
    }
    return {
      items: [{ id: "1", name: "ጄልና", price: 222, stock: 50 }],
      sales: [],
      expenses: [],
      capital: 124375
    };
  });

  const [tab, setTab] = useState("dashboard");
  const [selectedItemId, setSelectedItemId] = useState("");
  const [saleQty, setSaleQty] = useState(1);
  const [newItemName, setNewItemName] = useState("");
  const [newItemPrice, setNewItemPrice] = useState("");
  const [newItemStock, setNewItemStock] = useState("");

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }, [data]);

  // ስታቲስቲክስ ስሌቶች
  const todaySales = useMemo(() => data.sales.reduce((sum, s) => sum + s.total, 0), [data.sales]);
  const todayExpenses = useMemo(() => data.expenses.reduce((sum, e) => sum + e.amount, 0), [data.expenses]);
  const todayProfit = todaySales - todayExpenses;

  // በጣም የተሸጠ ዕቃ ስሌት
  const topSellingItem = useMemo(() => {
    if (data.sales.length === 0) return "ምንም አልተሸጠም";
    const counts = {};
    data.sales.forEach(s => {
      counts[s.itemName] = (counts[s.itemName] || 0) + s.qty;
    });
    let topItem = "";
    let maxQty = 0;
    Object.keys(counts).forEach(name => {
      if (counts[name] > maxQty) {
        maxQty = counts[name];
        topItem = `${name} (${maxQty} ጊዜ)`;
      }
    });
    return topItem;
  }, [data.sales]);

  // የሚያልቁ ዕቃዎች (ስቶክ ከ 5 በታች የሆኑ)
  const lowStockItems = useMemo(() => {
    return data.items.filter(i => (i.stock || 0) <= 5);
  }, [data.items]);

  // ሽያጭ መመዝገብ
  const handleAddSale = () => {
    const item = data.items.find(i => i.id === selectedItemId);
    if (!item) return alert("እባክዎ መጀመሪያ ዕቃ ይምረጡ!");
    if (item.stock < saleQty) return alert("በቂ ስቶክ የለም! የቀረው ስቶክ: " + item.stock);

    const total = item.price * saleQty;
    const newSale = {
      id: Date.now().toString(),
      itemName: item.name,
      qty: Number(saleQty),
      total: total,
      date: new Date().toLocaleDateString()
    };

    setData(prev => ({
      ...prev,
      sales: [...prev.sales, newSale],
      capital: prev.capital + total,
      items: prev.items.map(i => i.id === item.id ? { ...i, stock: i.stock - saleQty } : i)
    }));

    setSaleQty(1);
    alert("ሽያጭ ተመዝግቧል!");
  };

  // አዲስ ዕቃ መጨመር
  const handleAddItem = () => {
    if (!newItemName || !newItemPrice || !newItemStock) return alert("እባክዎ ሁሉንም ሳጥን ይሙሉ!");
    const newItem = {
      id: Date.now().toString(),
      name: newItemName,
      price: Number(newItemPrice),
      stock: Number(newItemStock)
    };
    setData(prev => ({ ...prev, items: [...prev.items, newItem] }));
    setNewItemName(""); setNewItemPrice(""); setNewItemStock("");
    alert("አዲስ ዕቃ ተጨምሯል!");
  };

  // ዕቃ መሰረዝ / ማጥፊያ
  const handleDeleteItem = (id) => {
    if(confirm("ይህንን ዕቃ በእርግጥ ማጥፋት ይፈልጋሉ?")) {
      setData(prev => ({
        ...prev,
        items: prev.items.filter(i => i.id !== id)
      }));
    }
  };

  return (
    <div className="w-full max-w-md mx-auto min-h-screen flex flex-col justify-between bg-[#F5F7F9]">
      
      {/* ራስጌ ክፍል */}
      <div className="bg-white py-4 shadow-sm text-center border-b">
        <h1 className="text-xl font-bold text-slate-800">የሱቅ መቆጣጠሪያ ሲስተም</h1>
      </div>

      {/* ዋናው ይዘት */}
      <div className="flex-1 p-4 overflow-y-auto pb-24">
        
        {/* TAB 1: ዳሽቦርድ */}
        {tab === "dashboard" && (
          <div className="space-y-4">
            <h2 className="text-sm font-semibold text-slate-500">📊 የሱቅ ወቅታዊ ሁኔታ</h2>
            
            <div className="bg-white border-l-4 border-blue-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
              <div>
                <p className="text-xs text-slate-400 font-medium">💰 ጠቅላላ ካፒታል</p>
                <p className="text-lg font-bold text-slate-800 mt-1">{fmt(data.capital)}</p>
              </div>
            </div>

            <div className="bg-white border-l-4 border-green-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
              <div>
                <p className="text-xs text-slate-400 font-medium">📈 የቀን የተጣራ ትርፍ</p>
                <p className="text-lg font-bold text-green-600 mt-1">{fmt(todayProfit)}</p>
              </div>
            </div>

            <div className="bg-white border-l-4 border-red-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
              <div>
                <p className="text-xs text-slate-400 font-medium">📉 የቀን ጠቅላላ ወጪ</p>
                <p className="text-lg font-bold text-red-500 mt-1">{fmt(todayExpenses)}</p>
              </div>
            </div>

            <div className="bg-amber-50 border-l-4 border-amber-500 rounded-xl p-4 shadow-sm flex justify-between items-center">
              <div>
                <p className="text-xs text-amber-600 font-medium">🔥 በጣም የሚሸጠው ዕቃ</p>
                <p className="text-base font-bold text-amber-900 mt-1">{topSellingItem}</p>
              </div>
            </div>

            {/* የሚያልቁ ዕቃዎች ማስጠንቀቂያ */}
            <div className="bg-white rounded-xl p-4 shadow-sm border border-orange-100">
              <h3 className="text-xs font-bold text-orange-600 mb-2">⚠️ ያለቁ / የሚያልቁ ዕቃዎች</h3>
              {lowStockItems.length === 0 ? (
                <p className="text-xs text-slate-400">ሁሉም ዕቃዎች በቂ ስቶክ አላቸው።</p>
              ) : (
                <div className="space-y-1.5">
                  {lowStockItems.map(i => (
                    <div key={i.id} className="flex justify-between items-center text-xs bg-orange-50 p-2 rounded">
                      <span className="font-medium text-slate-700">{i.name}</span>
                      <span className="bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full font-bold">ቀሪ ስቶክ: {i.stock}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* TAB 2: ሽያጭ መመዝገቢያ */}
        {tab === "sales" && (
          <div className="space-y-4">
            <h2 className="text-sm font-semibold text-slate-500">📝 1. ሽያጭ መመዝገቢያ ፎርም</h2>
            
            <div className="bg-white rounded-2xl p-4 shadow-sm space-y-4">
              <div>
                <label className="text-xs font-medium text-slate-500 block mb-1">የሚሸጠውን ዕቃ ይምረጡ፦</label>
                <select 
                  className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none"
                  value={selectedItemId}
                  onChange={(e) => setSelectedItemId(e.target.value)}
                >
                  <option value="">ዕቃ ይምረጡ...</option>
                  {data.items.map(i => (
                    <option key={i.id} value={i.id}>{i.name} (ዋጋ: {i.price} ብር - ስቶክ: {i.stock})</option>
                  ))}
                </select>
              </div>

              {/* የብዛት መጨመሪያ እዚህ ጋር ተስተካክሏል */}
              <div>
                <label className="text-xs font-medium text-slate-500 block mb-1">የዕቃ ብዛት (መጠን)፦</label>
                <div className="flex items-center gap-2">
                  <button 
                    onClick={() => setSaleQty(Math.max(1, saleQty - 1))}
                    className="w-10 h-10 bg-slate-100 font-bold rounded-lg text-slate-700 flex items-center justify-center border"
                  >-</button>
                  <input 
                    type="number" 
                    min="1" 
                    className="flex-1 text-center bg-slate-50 border border-slate-200 rounded-lg p-2 font-bold text-sm"
                    value={saleQty}
                    onChange={(e) => setSaleQty(Math.max(1, Number(e.target.value)))}
                  />
                  <button 
                    onClick={() => setSaleQty(saleQty + 1)}
                    className="w-10 h-10 bg-slate-100 font-bold rounded-lg text-slate-700 flex items-center justify-center border"
                  >+</button>
                </div>
              </div>

              <button 
                onClick={handleAddSale}
                className="w-full bg-emerald-500 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-600 transition shadow-md mt-2"
              >
                ሽያጭ መዝግብ ({saleQty} ዕቃ)
              </button>
            </div>
          </div>
        )}

        {/* TAB 3: የዕቃዎች ዝርዝር እና መሰረዣ */}
        {tab === "items" && (
          <div className="space-y-4">
            <h2 className="text-sm font-semibold text-slate-500">📦 አዲስ ዕቃ መጨመሪያ እና የነበሩት ዝርዝር</h2>
            
            <div className="bg-white rounded-2xl p-4 shadow-sm space-y-3">
              <input type="text" placeholder="የዕቃ ስም" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemName} onChange={e=>setNewItemName(e.target.value)} />
              <div className="grid grid-cols-2 gap-2">
                <input type="number" placeholder="የመሸጫ ዋጋ" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemPrice} onChange={e=>setNewItemPrice(e.target.value)} />
                <input type="number" placeholder="የመጀመሪያ ስቶክ" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none" value={newItemStock} onChange={e=>setNewItemStock(e.target.value)} />
              </div>
              <button onClick={handleAddItem} className="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-xl text-sm">ዕቃ ጨምር +</button>
            </div>

            <div className="space-y-2">
              <h3 className="text-xs font-bold text-slate-400">የተመዘገቡ ዕቃዎች ዝርዝር</h3>
              {data.items.map(i => (
                <div key={i.id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border">
                  <div>
                    <p className="font-bold text-sm text-slate-800">{i.name}</p>
                    <p className="text-xs text-slate-400">ዋጋ: {i.price} ብር | ስቶክ: {i.stock}</p>
                  </div>
                  {/* ማጥፊያ መሰረዣ ቁልፍ */}
                  <button 
                    onClick={() => handleDeleteItem(i.id)} 
                    className="p-2 text-red-100 hover:text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition"
                    title="ለመሰረዝ"
                  >
                    🗑️ ማጥፊያ
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* ታችኛው ማውጫ (Bottom Navigation) */}
      <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#1A1A1A] p-2 flex justify-around items-center rounded-t-2xl shadow-xl z-50">
        <button onClick={() => setTab("dashboard")} className={`flex flex-col items-center flex-1 py-1 ${tab === 'dashboard' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">🏠</span>
          <span className="text-[10px] mt-0.5">ዳሽቦርድ</span>
        </button>
        <button onClick={() => setTab("sales")} className={`flex flex-col items-center flex-1 py-1 ${tab === 'sales' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">📦</span>
          <span className="text-[10px] mt-0.5">ሽያጭ</span>
        </button>
        <button onClick={() => setTab("items")} className={`flex flex-col items-center flex-1 py-1 ${tab === 'items' ? 'text-white font-bold' : 'text-slate-400'}`}>
          <span className="text-lg">➕</span>
          <span className="text-[10px] mt-0.5">ዕቃ ጨምር</span>
        </button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
